<div class="search">
  <span class="search-icon" aria-hidden="true">🔍</span>
  <input
    class="search-input"
    type="search"
    inputmode="search"
    placeholder="Search recipes by title…"
    aria-label="Search recipes by title"
    data-testid="search-input"
    [value]="value"
    (input)="onInput($event)"
  />
  @if (value) {
    <button type="button" class="search-clear" aria-label="Clear search" (click)="clear()">✕</button>
  }
</div>
