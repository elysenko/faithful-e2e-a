<div class="overlay" data-testid="confirm-dialog" (click)="cancel.emit()">
  <div
    class="dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-title"
    (click)="$event.stopPropagation()"
  >
    <h2 id="confirm-title" class="dialog-title">{{ title }}</h2>
    @if (message) {
      <p class="dialog-message">{{ message }}</p>
    }
    <div class="dialog-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel.emit()">
        {{ cancelLabel }}
      </button>
      <button
        type="button"
        class="btn"
        [class.btn-danger]="danger"
        [class.btn-primary]="!danger"
        data-testid="confirm-accept"
        (click)="confirm.emit()"
      >
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
