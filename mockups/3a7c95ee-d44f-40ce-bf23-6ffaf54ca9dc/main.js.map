<!-- SMOKE_MARKER: MiniERP -->
<header class="app-header no-print">
  <button
    type="button"
    class="hamburger"
    aria-label="Open menu"
    (click)="toggleDrawer()"
  >☰</button>

  <a class="brand" routerLink="/">
    <span class="brand-mark">M</span>
    <span class="brand-name">MiniERP</span>
  </a>

  <nav class="top-nav">
    @for (item of nav(); track item.link) {
      <a
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: !!item.exact }"
        class="top-nav-link"
      >{{ item.label }}</a>
    }
  </nav>

  <div class="header-right">
    <span class="user-chip">
      <span class="role-dot"></span>
      <span class="user-name">{{ userName() }}</span>
      <span class="role-tag">{{ roleLabel() }}</span>
    </span>
    <button type="button" class="btn btn-outline btn-sm" (click)="logout()">Sign out</button>
  </div>
</header>

<!-- Mobile drawer -->
@if (drawerOpen()) {
  <div class="drawer-backdrop no-print" (click)="toggleDrawer()"></div>
  <aside class="drawer no-print" aria-label="Primary navigation">
    <div class="drawer-head">
      <span class="brand-name">MiniERP</span>
      <button type="button" class="drawer-close" aria-label="Close menu" (click)="toggleDrawer()">✕</button>
    </div>
    <div class="drawer-user">
      <span class="user-name">{{ userName() }}</span>
      <span class="role-tag">{{ roleLabel() }}</span>
    </div>
    <nav class="drawer-nav">
      @for (item of nav(); track item.link) {
        <a
          [routerLink]="item.link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: !!item.exact }"
          class="drawer-link"
        >
          <span class="dn-icon" aria-hidden="true">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
    <button type="button" class="btn btn-outline btn-block" (click)="logout()">Sign out</button>
  </aside>
}

<main class="app-main">
  <router-outlet />
</main>
