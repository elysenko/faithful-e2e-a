<div class="page">
  <div class="page-head">
    <a class="btn btn-ghost btn-sm" routerLink="/customers">← Customers</a>
  </div>

  @if (loading()) {
    <div class="state"><div class="spinner"></div><p>Loading…</p></div>
  } @else if (error()) {
    <div class="state state-error"><span class="state-icon">⚠️</span><p>{{ error() }}</p></div>
  } @else {
    @if (customer(); as c) {
      <div class="page-head">
        <h1>{{ c.name }}</h1>
        <div class="spacer"></div>
        @if (canEdit()) {
          <a class="btn btn-outline" routerLink="/customers" [queryParams]="{ edit: c.id }">Edit</a>
        }
      </div>
      <div class="card card-pad">
        <div class="dl">
          <div class="dl-row"><span class="dl-key">Name</span><span class="dl-val">{{ c.name }}</span></div>
          <div class="dl-row"><span class="dl-key">Email</span><span class="dl-val">{{ c.email }}</span></div>
          <div class="dl-row"><span class="dl-key">Phone</span><span class="dl-val">{{ c.phone || '—' }}</span></div>
        </div>
      </div>
    } @else {
      <div class="state"><span class="state-icon">🔍</span><p>Customer not found.</p></div>
    }
  }
</div>
