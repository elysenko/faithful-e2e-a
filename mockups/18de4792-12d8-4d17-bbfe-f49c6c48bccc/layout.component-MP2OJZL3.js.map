<header class="app-header no-print">
  <a class="brand" routerLink="/returns">
    <span class="brand-mark">EF</span>
    <span class="brand-name">EasyFile</span>
  </a>

  <nav class="top-nav">
    @for (item of visibleItems; track item.link) {
      <a [routerLink]="item.link" routerLinkActive="active" class="top-nav-link">
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="header-right">
    <span class="user-chip">
      <span class="role-dot" [class.admin]="auth.isAdmin()"></span>
      <span class="user-name">{{ auth.user()?.name || 'Filer' }}</span>
      <span class="role-tag">{{ auth.isAdmin() ? 'Admin' : 'Filer' }}</span>
    </span>
    <button type="button" class="btn btn-outline btn-sm" (click)="logout()">Sign out</button>
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>

<nav class="bottom-nav no-print" aria-label="Primary">
  @for (item of visibleItems; track item.link) {
    <a [routerLink]="item.link" routerLinkActive="active" class="bottom-nav-item">
      <span class="bn-icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="bn-label">{{ item.label }}</span>
    </a>
  }
  <button type="button" class="bottom-nav-item" (click)="logout()">
    <span class="bn-icon" aria-hidden="true">⎋</span>
    <span class="bn-label">Sign out</span>
  </button>
</nav>
