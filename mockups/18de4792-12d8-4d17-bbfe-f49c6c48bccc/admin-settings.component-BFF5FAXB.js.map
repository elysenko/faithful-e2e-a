<div class="page">
  <div class="page-head">
    <h1>Service settings</h1>
  </div>

  @if (loading()) {
    <div class="state">Loading settings…</div>
  } @else {
    <div class="stack">
      @for (svc of services(); track svc.service) {
        <div class="card svc-card">
          <div class="svc-head">
            <div class="svc-title">
              <h3>{{ svc.label }}</h3>
              <code class="svc-key">{{ svc.service }}</code>
            </div>
            <span class="badge" [class.badge-ok]="svc.configured" [class.badge-warn]="!svc.configured">
              {{ svc.configured ? 'Configured' : 'Not configured' }}
            </span>
          </div>

          <form (ngSubmit)="save(svc)">
            <div class="svc-grid">
              @for (f of svc.fields; track f.key) {
                <div class="field">
                  <label [attr.for]="f.key">{{ f.label }}</label>
                  <input [id]="f.key" [name]="f.key"
                         [type]="f.secret ? 'password' : 'text'"
                         [(ngModel)]="f.value" [placeholder]="f.label" />
                </div>
              }
            </div>
            <div class="svc-actions">
              @if (saved() === svc.service) {
                <span class="badge badge-ok">✓ Saved</span>
              }
              <button type="submit" class="btn btn-primary btn-sm">Save {{ svc.label }}</button>
            </div>
          </form>
        </div>
      }
    </div>
  }
</div>
