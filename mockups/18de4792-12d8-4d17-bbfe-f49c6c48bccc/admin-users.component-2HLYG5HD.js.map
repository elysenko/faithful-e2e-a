<div class="page">
  <div class="page-head">
    <h1>Users</h1>
    <span class="spacer"></span>
    <span class="muted">{{ users().length }} total</span>
  </div>

  @if (loading()) {
    <div class="state">Loading users…</div>
  } @else if (error()) {
    <div class="state state-error">{{ error() }}</div>
  } @else if (users().length === 0) {
    <div class="state">No users yet.</div>
  } @else {
    <div class="card user-list">
      @for (u of users(); track u.id) {
        <div class="user-row">
          <span class="avatar" aria-hidden="true">{{ initials(u) }}</span>
          <div class="user-main">
            <span class="user-name">{{ u.name || '—' }}</span>
            <span class="user-email muted">{{ u.email }}</span>
          </div>
          <span class="badge" [class.badge-info]="u.role === 'admin'" [class.badge-off]="u.role === 'filer'">
            {{ u.role }}
          </span>
          <span class="user-date muted">{{ u.createdAt }}</span>
        </div>
      }
    </div>
  }
</div>
