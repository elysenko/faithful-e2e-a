<section class="wiz-step">
  <h2>What's your filing status?</h2>
  <p class="lead">This determines your standard deduction and tax brackets.</p>

  <div class="status-list">
    @for (opt of options; track opt.value) {
      <button type="button" class="status-opt"
              [class.selected]="selected() === opt.value"
              (click)="choose(opt.value)">
        <span class="radio" aria-hidden="true"></span>
        <span class="opt-main">
          <span class="opt-label">{{ opt.label }}</span>
          <span class="opt-hint">{{ opt.hint }}</span>
        </span>
      </button>
    }
  </div>

  <div class="wiz-actions">
    <button type="button" class="btn btn-primary" (click)="next()">
      Continue
    </button>
  </div>
</section>
