<div class="auth-wrap">
  <div class="auth-card card">
    <div class="auth-brand">
      <span class="brand-mark">EF</span>
      <span class="brand-name">EasyFile</span>
    </div>
    <p class="auth-tagline">Create your account to start filing</p>

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" autocomplete="name"
               [(ngModel)]="name" placeholder="Jordan Filer" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email"
               [(ngModel)]="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password"
               [(ngModel)]="password" placeholder="••••••••" />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password"
               [(ngModel)]="confirm" placeholder="••••••••" />
      </div>

      @if (error) {
        <p class="error" role="alert">{{ error }}</p>
      }

      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>

    <p class="auth-alt">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>

    <div class="auth-divider"><span>or</span></div>

    <button type="button" class="demo-link" (click)="demo()">
      Skip signup — Demo Mode
    </button>
  </div>
</div>
