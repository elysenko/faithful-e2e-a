<section class="wiz-step">
  <h2>Any dependents?</h2>
  <p class="lead">Dependents under 17 qualify for the $2,000 Child Tax Credit.</p>

  @if (dependents().length === 0) {
    <p class="muted">No dependents added yet.</p>
  } @else {
    <div class="item-list">
      @for (d of dependents(); track d.id) {
        <div class="item-row">
          <div class="item-main">
            <span class="item-title">{{ d.name }}</span>
            <span class="item-sub">
              Age {{ d.age }}
              @if (d.age < 17) { · <span class="ctc">CTC eligible</span> }
            </span>
          </div>
          <button type="button" class="item-remove" (click)="remove(d.id)"
                  aria-label="Remove dependent">✕</button>
        </div>
      }
    </div>
  }

  <form class="add-form" (ngSubmit)="add()">
    <div class="add-grid">
      <div class="field">
        <label for="dep-name">Name</label>
        <input id="dep-name" name="depName" type="text" [(ngModel)]="newName" placeholder="Dependent name" />
      </div>
      <div class="field">
        <label for="dep-age">Age</label>
        <input id="dep-age" name="depAge" type="number" min="0" [(ngModel)]="newAge" placeholder="Age" />
      </div>
    </div>
    <button type="submit" class="btn btn-outline">+ Add dependent</button>
  </form>

  <div class="wiz-actions">
    <button type="button" class="btn btn-outline" (click)="back()">Back</button>
    <button type="button" class="btn btn-primary" (click)="next()">Continue</button>
  </div>
</section>
