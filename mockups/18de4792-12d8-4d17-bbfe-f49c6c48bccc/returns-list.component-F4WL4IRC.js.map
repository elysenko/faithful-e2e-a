<div class="page">
  <div class="page-head">
    <h1>My tax returns</h1>
    <span class="spacer"></span>
    <button type="button" class="btn btn-primary" (click)="newReturn()">
      + New return
    </button>
  </div>

  @if (loading()) {
    <div class="state">Loading your returns…</div>
  } @else if (error()) {
    <div class="state state-error">{{ error() }}</div>
  } @else if (returns().length === 0) {
    <div class="card card-pad empty">
      <div class="empty-emoji">📄</div>
      <h3>No returns yet</h3>
      <p class="muted">Start your first return to walk through the guided interview.</p>
      <button type="button" class="btn btn-primary" (click)="newReturn()">Start a return</button>
    </div>
  } @else {
    <div class="returns-grid">
      @for (r of returns(); track r.id) {
        <button type="button" class="return-card card" (click)="open(r)">
          <div class="rc-top">
            <span class="rc-year">{{ r.year }}</span>
            <span class="badge" [class.badge-ok]="r.status === 'complete'"
                  [class.badge-warn]="r.status === 'draft'">
              {{ r.status === 'complete' ? 'Complete' : 'Draft' }}
            </span>
          </div>
          <div class="rc-status">{{ statusLabels[r.filingStatus] }}</div>
          <div class="rc-meta muted">
            @if (r.status === 'draft') {
              Next step: {{ stepLabels[r.currentStep] }}
            } @else {
              Filed · {{ r.updatedAt }}
            }
          </div>
          <div class="rc-cta">
            {{ r.status === 'complete' ? 'View return →' : 'Resume →' }}
          </div>
        </button>
      }
    </div>
  }
</div>
