<div class="auth-wrap">
  <div class="auth-card card">
    <div class="auth-brand">
      <span class="brand-mark">EF</span>
      <span class="brand-name">EasyFile</span>
    </div>
    <p class="auth-tagline">Your guided 1040 tax organizer</p>

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email"
               [(ngModel)]="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               [(ngModel)]="password" placeholder="••••••••" />
      </div>

      @if (error) {
        <p class="error" role="alert">{{ error }}</p>
      }

      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <p class="auth-alt">
      New to EasyFile? <a routerLink="/signup">Create an account</a>
    </p>

    <div class="auth-divider"><span>or</span></div>

    <button type="button" class="demo-link" (click)="demo()">
      Skip login — Demo Mode
    </button>
  </div>
</div>
