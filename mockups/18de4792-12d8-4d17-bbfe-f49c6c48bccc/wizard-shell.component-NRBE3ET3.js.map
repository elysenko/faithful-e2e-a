<div class="page wizard">
  <div class="wizard-head no-print">
    <button type="button" class="btn btn-ghost btn-sm exit" (click)="exit()">← All returns</button>
    <h1>{{ taxReturn()?.year }} return</h1>
  </div>

  <ol class="stepper no-print">
    @for (s of steps; track s.slug; let i = $index) {
      <li class="step"
          [class.done]="i < activeIndex()"
          [class.active]="i === activeIndex()">
        <button type="button" class="step-btn" (click)="goTo(s.slug)"
                [attr.aria-current]="i === activeIndex() ? 'step' : null">
          <span class="step-num">{{ i < activeIndex() ? '✓' : i + 1 }}</span>
          <span class="step-label">{{ s.label }}</span>
        </button>
      </li>
    }
  </ol>

  <div class="wizard-body">
    <router-outlet />
  </div>
</div>
