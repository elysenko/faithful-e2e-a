<div class="ms-head">
  <div class="ms-counts">
    <span class="badge badge-ok">{{ counts().done }} done</span>
    <span class="badge badge-muted">{{ counts().pending }} pending</span>
    <span class="badge badge-danger">{{ counts().late }} late</span>
  </div>
  @if (auth.isPlanner()) {
    <button type="button" class="btn btn-primary btn-sm">＋ Add milestone</button>
  }
</div>

@if (sorted().length === 0) {
  <div class="state"><span class="state-icon">🚩</span><p>No milestones yet.</p></div>
} @else {
  <ol class="timeline card card-pad">
    @for (m of sorted(); track m.id) {
      <li class="tl-item">
        <span class="tl-dot" [class]="dotClass(m.status)" aria-hidden="true"></span>
        <div class="tl-body">
          <div class="tl-row">
            <span class="tl-name">{{ m.name }}</span>
            <span class="badge" [class]="statusClass(m.status)">{{ statusLabel(m.status) }}</span>
          </div>
          <span class="tl-date muted">Due {{ fmt(m.dueOn) }}</span>
        </div>
      </li>
    }
  </ol>
}
