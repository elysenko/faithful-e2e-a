<div class="gantt-wrap">
  <div class="gantt-head">
    <div>
      <h3 class="g-title">Schedule</h3>
      <p class="hint">
        @if (auth.isPlanner()) {
          Drag across a bar to update its progress. Arrows show task dependencies.
        } @else {
          Read-only view. Arrows show task dependencies.
        }
      </p>
    </div>
    <div class="phase-legend">
      @for (p of phases(); track p.id; let i = $index) {
        <span class="pl-item">
          <i class="pl-sw" [style.background]="i === 0 ? 'var(--color-phase-a)' : i === 1 ? 'var(--color-phase-b)' : 'var(--color-phase-c)'"></i>
          {{ p.name }}
        </span>
      }
    </div>
  </div>

  <div class="scroll-x gantt-scroll">
    <svg
      [attr.width]="width()"
      [attr.height]="height()"
      [attr.viewBox]="'0 0 ' + width() + ' ' + height()"
      class="gantt-svg"
      role="img"
      aria-label="Project schedule Gantt chart"
    >
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L6,3 L0,6 Z" fill="var(--color-faint)" />
        </marker>
      </defs>

      <!-- Timeline gridlines + date ticks -->
      @for (tk of ticks(); track tk.x) {
        <line [attr.x1]="tk.x" [attr.y1]="headerH" [attr.x2]="tk.x" [attr.y2]="height() - 8"
              stroke="var(--color-border)" stroke-width="1" />
        <text [attr.x]="tk.x + 4" [attr.y]="headerH - 12" class="g-tick">{{ tk.label }}</text>
      }
      <line [attr.x1]="labelW" [attr.y1]="headerH" [attr.x2]="width()" [attr.y2]="headerH"
            stroke="var(--color-border-strong)" stroke-width="1" />

      <!-- Row backgrounds + labels -->
      @for (r of rows(); track r.id; let i = $index) {
        <rect x="0" [attr.y]="headerH + i * rowH" [attr.width]="width()" [attr.height]="rowH"
              [attr.fill]="i % 2 === 0 ? 'var(--color-surface)' : 'var(--color-surface-alt)'" />
        <text x="12" [attr.y]="headerH + i * rowH + rowH / 2 + 4" class="g-label">{{ r.name }}</text>
      }

      <!-- Dependency arrows -->
      @for (a of arrows(); track a.id) {
        <path [attr.d]="a.d" fill="none" stroke="var(--color-faint)" stroke-width="1.5"
              stroke-dasharray="3 2" marker-end="url(#arrow)" />
      }

      <!-- Task bars -->
      @for (r of rows(); track r.id) {
        <g class="bar-group">
          <rect [attr.x]="r.x" [attr.y]="r.y" [attr.width]="r.w" [attr.height]="r.h" rx="5"
                [attr.fill]="r.phaseColorVar" opacity="0.22" />
          <rect [attr.x]="r.x" [attr.y]="r.y" [attr.width]="r.progW" [attr.height]="r.h" rx="5"
                [attr.fill]="r.phaseColorVar" />
          <text [attr.x]="r.x + 6" [attr.y]="r.y + r.h / 2 + 4" class="g-bar-pct">{{ r.progressPct }}%</text>

          <!-- Interactive overlay: planner drags to set progress -->
          <rect
            class="bar-hit"
            [class.editable]="auth.isPlanner()"
            [attr.x]="r.x" [attr.y]="r.y" [attr.width]="r.w" [attr.height]="r.h" rx="5"
            fill="transparent"
            (pointerdown)="onBarDown($event, r)"
            (pointermove)="onBarMove($event, r)"
            (pointerup)="onBarUp(r)"
          >
            <title>{{ r.name }} — {{ r.progressPct }}%</title>
          </rect>
        </g>
      }
    </svg>
  </div>
</div>
