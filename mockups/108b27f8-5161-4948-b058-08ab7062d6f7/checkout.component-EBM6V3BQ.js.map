<div class="container">
  <a routerLink="/cart" class="back-link">← Back to cart</a>
  <h1 class="page-title">Checkout</h1>

  <div class="checkout-layout">
    <form class="card checkout-form" (ngSubmit)="submit()">
      <h2>Shipping details</h2>

      <div class="field">
        <label for="shipName">Full name</label>
        <input id="shipName" type="text" name="shipName" [(ngModel)]="shipName"
               autocomplete="name" placeholder="Ada Lovelace" />
      </div>

      <div class="field">
        <label for="shipAddress">Shipping address</label>
        <textarea id="shipAddress" name="shipAddress" [(ngModel)]="shipAddress"
                  autocomplete="street-address"
                  placeholder="123 Analytical Engine Way, London, UK"></textarea>
      </div>

      @if (error()) {
        <p class="error checkout-error">⚠️ {{ error() }}</p>
      }

      <button type="submit" class="btn btn-accent btn-block" [disabled]="submitting()">
        {{ submitting() ? 'Placing order…' : 'Place order · ' + money(totalCents()) }}
      </button>
    </form>

    <aside class="summary card">
      <h2>Order summary</h2>
      <ul class="summary-items">
        @for (item of items(); track item.productId) {
          <li class="summary-item">
            <span class="si-name">{{ item.product?.name }} <span class="muted">× {{ item.qty }}</span></span>
            <span class="si-price">{{ money((item.product?.priceCents ?? 0) * item.qty) }}</span>
          </li>
        }
      </ul>
      <div class="summary-row total">
        <span>Total</span>
        <span>{{ money(totalCents()) }}</span>
      </div>
    </aside>
  </div>
</div>
