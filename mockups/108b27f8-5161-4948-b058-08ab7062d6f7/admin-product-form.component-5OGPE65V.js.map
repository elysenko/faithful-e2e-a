<div class="container narrow">
  <a routerLink="/admin/products" class="back-link">← Back to products</a>
  <h1 class="page-title">{{ isEdit() ? 'Edit product' : 'New product' }}</h1>

  <form class="card form-card" (ngSubmit)="submit()">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" name="name" [(ngModel)]="name" placeholder="Aurora Wireless Headphones" />
    </div>

    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" [(ngModel)]="description"
                placeholder="Short product description"></textarea>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="price">Price (USD)</label>
        <input id="price" type="number" name="price" [(ngModel)]="priceDollars"
               min="0" step="0.01" inputmode="decimal" placeholder="189.00" />
      </div>
      <div class="field">
        <label for="stock">Stock quantity</label>
        <input id="stock" type="number" name="stock" [(ngModel)]="stockQty"
               min="0" step="1" inputmode="numeric" placeholder="24" />
      </div>
    </div>

    <div class="field">
      <label for="imageUrl">Image URL</label>
      <input id="imageUrl" type="url" name="imageUrl" [(ngModel)]="imageUrl"
             placeholder="https://…" />
    </div>

    @if (imageUrl) {
      <div class="preview">
        <img [src]="imageUrl" alt="Preview" width="120" height="120" />
      </div>
    }

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <div class="form-actions">
      <a routerLink="/admin/products" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary" [disabled]="submitting()">
        {{ submitting() ? 'Saving…' : (isEdit() ? 'Save changes' : 'Create product') }}
      </button>
    </div>
  </form>
</div>
