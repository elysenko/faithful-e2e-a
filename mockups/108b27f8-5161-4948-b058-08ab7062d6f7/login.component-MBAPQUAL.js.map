<div class="auth-shell">
  <div class="auth-card card">
    <div class="auth-brand">
      <span class="brand-mark">S</span>
      <span class="brand-name">Storefront</span>
    </div>
    <h1>Welcome back</h1>
    <p class="muted">Log in to fill your cart and check out.</p>

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" [(ngModel)]="email"
               autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" [(ngModel)]="password"
               autocomplete="current-password" placeholder="••••••••" />
      </div>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button type="submit" class="btn btn-primary btn-block" [disabled]="submitting()">
        {{ submitting() ? 'Signing in…' : 'Log in' }}
      </button>
    </form>

    <p class="demo-hint muted">
      Demo accounts — <strong>admin&#64;demo</strong> / <strong>shopper&#64;demo</strong>,
      password <strong>Demo1234!</strong>
    </p>

    <p class="auth-alt">
      New to Storefront? <a routerLink="/signup">Create an account</a>
    </p>

    <div class="demo">
      <span class="demo-label">Skip login — Demo Mode</span>
      <div class="demo-row">
        <button type="button" class="btn btn-outline btn-sm" (click)="demo('admin')">
          Demo as Admin
        </button>
        <button type="button" class="btn btn-outline btn-sm" (click)="demo('shopper')">
          Demo as Shopper
        </button>
      </div>
    </div>
  </div>
</div>
