  <!-- Story photography: pulls a topical image into each article card once Angular has rendered it. -->
  <script>
  (function () {
    function slugOf(card) {
      var chip = card.querySelector('[class*="cat-"]');
      if (chip) {
        var m = chip.className.match(/cat-([a-z]+)/);
        if (m && m[1] !== 'default') return m[1];
      }
      return 'news';
    }
    function decorate() {
      var cards = document.querySelectorAll('li.article-card');
      cards.forEach(function (card, i) {
        var link = card.querySelector('.article-link');
        if (!link || link.querySelector('.article-photo')) return;
        var isLead = card === card.parentElement.firstElementChild;
        var slug = slugOf(card);
        var w = isLead ? 1120 : 800;
        var h = isLead ? 700 : 540;
        var img = document.createElement('img');
        img.className = 'article-photo' + (isLead ? ' article-photo-lead' : '');
        img.loading = 'lazy';
        img.alt = '';
        img.setAttribute('aria-hidden', 'true');
        img.src = 'https://picsum.photos/seed/' + slug + '-' + i + '/' + w + '/' + h;
        img.addEventListener('error', function () {
          img.classList.add('article-photo-fallback');
          img.removeAttribute('src');
        });
        link.insertBefore(img, link.firstChild);
      });
    }
    var pending = false;
    function schedule() {
      if (pending) return;
      pending = true;
      requestAnimationFrame(function () { pending = false; decorate(); });
    }
    function boot() {
      new MutationObserver(schedule).observe(document.body, { childList: true, subtree: true });
      schedule();
    }
    if (document.readyState !== 'loading') boot();
    else document.addEventListener('DOMContentLoaded', boot);
  })();
  </script>
