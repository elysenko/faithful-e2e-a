<nav class="filter" aria-label="Filter articles by category">
  <div class="filter-scroll">
    <button
      type="button"
      class="filter-chip"
      [class.active]="active === null"
      (click)="choose(null)"
    >
      All
    </button>

    @for (cat of categories; track cat.id) {
      <button
        type="button"
        class="filter-chip"
        [class.active]="active === cat.name"
        (click)="choose(cat.name)"
      >
        <span class="dot cat-{{ cat.slug }}" aria-hidden="true"></span>
        {{ cat.name }}
        <span class="filter-count">{{ cat.articleCount }}</span>
      </button>
    }
  </div>
</nav>
