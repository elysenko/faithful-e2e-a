@if (totalPages > 1) {
  <nav class="pagination" aria-label="Pagination">
    <button
      type="button"
      class="page-btn page-arrow"
      [disabled]="!canPrev"
      (click)="go(page - 1)"
      aria-label="Previous page"
    >
      ‹ Prev
    </button>

    <div class="page-numbers">
      @if (pages[0] > 1) {
        <button type="button" class="page-btn" (click)="go(1)">1</button>
        @if (pages[0] > 2) {
          <span class="page-ellipsis" aria-hidden="true">…</span>
        }
      }

      @for (p of pages; track p) {
        <button
          type="button"
          class="page-btn"
          [class.active]="p === page"
          [attr.aria-current]="p === page ? 'page' : null"
          (click)="go(p)"
        >
          {{ p }}
        </button>
      }

      @if (pages[pages.length - 1] < totalPages) {
        @if (pages[pages.length - 1] < totalPages - 1) {
          <span class="page-ellipsis" aria-hidden="true">…</span>
        }
        <button type="button" class="page-btn" (click)="go(totalPages)">{{ totalPages }}</button>
      }
    </div>

    <button
      type="button"
      class="page-btn page-arrow"
      [disabled]="!canNext"
      (click)="go(page + 1)"
      aria-label="Next page"
    >
      Next ›
    </button>
  </nav>
}
