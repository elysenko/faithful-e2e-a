<ul class="article-list">
  @for (article of articles; track article.id) {
    <li class="article-card">
      <a class="article-link" [href]="article.url" target="_blank" rel="noopener noreferrer">
        <div class="article-meta">
          <span class="chip {{ catClass(article.categorySlug) }}">{{ article.category }}</span>
          <span class="article-source">{{ article.sourceName }}</span>
          <span class="article-dot" aria-hidden="true">·</span>
          <time class="article-time" [attr.datetime]="article.publishedAt">{{ timeAgo(article.publishedAt) }}</time>
        </div>
        <h3 class="article-title">{{ article.title }}</h3>
        @if (article.excerpt) {
          <p class="article-excerpt">{{ article.excerpt }}</p>
        }
      </a>
    </li>
  }
</ul>
