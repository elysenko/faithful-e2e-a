<div class="page-title-row">
  <div>
    <h1>Settings</h1>
    <p class="muted">Configure credentials for provisioned services. Manager only.</p>
  </div>
</div>

@if (saved()) {
  <div class="notice saved" role="status">
    <span class="badge badge-success">Saved</span>
    <span class="text-sm">{{ saved() }} credentials updated.</span>
  </div>
}

<div class="settings-grid">
  @for (s of settings(); track s.key) {
    <form class="card card-pad" (ngSubmit)="save(s)">
      <div class="row-between">
        <h2>{{ s.label }}</h2>
        @if (s.configured) {
          <span class="badge badge-success">Configured</span>
        } @else {
          <span class="badge badge-warning">Not configured</span>
        }
      </div>
      @for (f of s.fields; track f.key) {
        <div class="field">
          <label [for]="f.key">{{ f.label }}</label>
          <input [id]="f.key" [name]="f.key" [(ngModel)]="values[f.key]"
                 [placeholder]="s.configured ? s.maskedValue : f.placeholder" />
        </div>
      }
      <button type="submit" class="btn btn-primary">Save {{ s.label }}</button>
    </form>
  }
</div>
