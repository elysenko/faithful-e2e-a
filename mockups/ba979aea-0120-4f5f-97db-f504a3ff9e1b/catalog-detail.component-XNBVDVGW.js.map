<div class="page" data-testid="catalog-detail">
  <a routerLink="/catalog" class="back-link">← Back to shop</a>

  @if (product(); as p) {
    <div class="detail-layout mt-4">
      <div class="detail-media">
        <img [src]="p.imageUrl" [alt]="p.name" width="720" height="540" />
      </div>
      <div class="detail-info">
        <h1>{{ p.name }}</h1>
        <div class="price price-lg">{{ p.priceCents | money }}</div>

        @if (p.stockQty === 0) {
          <span class="badge badge-out">Out of stock</span>
        } @else {
          <span class="badge badge-shipped">{{ p.stockQty }} in stock</span>
        }

        <p class="mt-4">{{ p.description }}</p>

        <button
          class="btn btn-block mt-4"
          data-testid="detail-add-to-cart"
          [disabled]="p.stockQty === 0"
          (click)="addToCart()"
        >
          @if (p.stockQty === 0) {
            Unavailable
          } @else {
            {{ added() ? 'Added to cart ✓' : 'Add to cart' }}
          }
        </button>
      </div>
    </div>
  } @else {
    <div class="card mt-4">
      <p class="muted">Product not found.</p>
      <a routerLink="/catalog" class="btn btn-secondary btn-sm mt-2">Return to shop</a>
    </div>
  }
</div>
