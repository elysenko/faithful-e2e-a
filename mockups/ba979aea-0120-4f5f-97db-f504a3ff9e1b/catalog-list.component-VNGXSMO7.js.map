<div class="page" data-testid="app-ready">
  <div class="page-header">
    <div>
      <h1>Shop</h1>
      <p class="muted">Browse our latest gear and accessories.</p>
    </div>
  </div>

  <div class="grid" data-testid="catalog-grid">
    @for (product of products(); track product.id) {
      <a class="card product-card" [routerLink]="['/catalog', product.id]"
         [attr.data-testid]="'product-card-' + product.id">
        <div class="product-thumb">
          <img [src]="product.imageUrl" [alt]="product.name" width="480" height="360" loading="lazy" />
          @if (product.stockQty === 0) {
            <span class="badge badge-out thumb-badge">Out of stock</span>
          }
        </div>
        <div class="product-body">
          <h3 class="product-name">{{ product.name }}</h3>
          <p class="muted product-desc">{{ product.description }}</p>
          <div class="row between mt-2">
            <span class="price">{{ product.priceCents | money }}</span>
            <button
              class="btn btn-sm"
              [disabled]="product.stockQty === 0"
              [attr.data-testid]="'add-to-cart-' + product.id"
              (click)="addToCart(product, $event)"
            >
              {{ addedId() === product.id ? 'Added ✓' : 'Add' }}
            </button>
          </div>
        </div>
      </a>
    }
  </div>
</div>
