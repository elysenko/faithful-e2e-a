<div class="playback" data-testid="playback-controls" [class.disabled]="disabled()">
  <div class="track-row">
    <span class="frame-counter" data-testid="frame-counter">
      {{ totalFrames() ? currentIndex() + 1 : 0 }} / {{ totalFrames() }}
    </span>
    <input
      class="scrubber"
      type="range"
      min="0"
      [max]="maxIndex()"
      step="1"
      [value]="currentIndex()"
      [disabled]="disabled() || totalFrames() === 0"
      (input)="onScrub($event)"
      aria-label="Scrub to frame"
      data-testid="timeline-slider"
    />
  </div>

  <div class="button-row">
    <div class="transport">
      <button
        type="button"
        class="ctrl"
        (click)="stepBackward.emit()"
        [disabled]="disabled() || atStart()"
        aria-label="Step backward one frame"
        data-testid="step-back"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M6 5h2v14H6zM20 5v14l-11-7z" fill="currentColor" />
        </svg>
      </button>

      <button
        type="button"
        class="ctrl primary"
        (click)="playToggle.emit()"
        [disabled]="disabled()"
        [attr.aria-label]="isPlaying() ? 'Pause' : 'Play'"
        data-testid="play-pause"
      >
        @if (isPlaying()) {
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M7 5h4v14H7zM13 5h4v14h-4z" fill="currentColor" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M7 5v14l12-7z" fill="currentColor" />
          </svg>
        }
      </button>

      <button
        type="button"
        class="ctrl"
        (click)="stepForward.emit()"
        [disabled]="disabled() || atEnd()"
        aria-label="Step forward one frame"
        data-testid="step-forward"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M16 5h2v14h-2zM4 5l11 7-11 7z" fill="currentColor" />
        </svg>
      </button>
    </div>

    <label class="speed">
      <span class="speed-label">Speed</span>
      <select
        [value]="speed()"
        [disabled]="disabled()"
        (change)="onSpeed($event)"
        aria-label="Playback speed"
        data-testid="speed-select"
      >
        @for (s of speeds; track s) {
          <option [value]="s">{{ s }} fps</option>
        }
      </select>
    </label>
  </div>
</div>
