<form class="picker" (submit)="$event.preventDefault(); apply()" data-testid="date-range-picker">
  <div class="fields">
    <label class="field">
      <span class="field-label">Start date</span>
      <input
        type="date"
        [value]="draftStart()"
        [min]="minIso"
        [max]="maxIso"
        (input)="onStart($event)"
        data-testid="start-date"
      />
    </label>

    <span class="arrow" aria-hidden="true">→</span>

    <label class="field">
      <span class="field-label">End date</span>
      <input
        type="date"
        [value]="draftEnd()"
        [min]="minIso"
        [max]="maxIso"
        (input)="onEnd($event)"
        data-testid="end-date"
      />
    </label>
  </div>

  <p class="lookback-note" data-testid="lookback-note">{{ lookbackNote }}</p>

  @if (error()) {
    <p class="error" role="alert" data-testid="range-error">{{ error() }}</p>
  } @else if (dayCount() > 0) {
    <p class="count" data-testid="range-count">
      {{ dayCount() }} {{ dayCount() === 1 ? 'day' : 'days' }} selected
    </p>
  }

  <button
    type="submit"
    class="apply-btn"
    [disabled]="!canApply()"
    data-testid="apply-range"
  >
    Load animation
  </button>
</form>
