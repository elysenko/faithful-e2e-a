<div class="login-page" data-testid="admin-login-page">
  <form class="card" (submit)="$event.preventDefault(); submit()">
    <div class="card-head">
      <span class="brand-mark" aria-hidden="true"></span>
      <h1>Admin sign in</h1>
      <p>Restricted console for ingestion &amp; configuration.</p>
    </div>

    @if (error()) {
      <p class="form-error" role="alert" data-testid="login-error">{{ error() }}</p>
    }

    <label class="field">
      <span>Email</span>
      <input
        type="email"
        autocomplete="username"
        placeholder="admin@noaa-viz.local"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
        data-testid="login-email"
      />
    </label>

    <label class="field">
      <span>Password</span>
      <input
        type="password"
        autocomplete="current-password"
        placeholder="••••••••"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
        data-testid="login-password"
      />
    </label>

    <button type="submit" class="submit" data-testid="login-submit">Sign in</button>

    <button
      type="button"
      class="demo-link"
      (click)="demoLogin()"
      data-testid="demo-mode"
    >
      Skip login — Demo Mode
    </button>
  </form>
</div>
