<div class="auth-wrap" data-testid="app-ready">
  <div class="auth-card">
    <div class="brand"><span class="mark">◈</span> Nexus Power</div>
    <h2>Create your account</h2>
    <p class="muted">The first account created becomes the workspace admin.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" formControlName="name" autocomplete="name" placeholder="Jordan Rivera" />
      </div>
      <div class="field">
        <label for="email">Work email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" placeholder="you@nexuspower.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="new-password" placeholder="At least 6 characters" />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" formControlName="confirm" autocomplete="new-password" placeholder="Re-enter password" />
        @if (form.errors?.['mismatch'] && form.get('confirm')?.touched) {
          <span class="err">Passwords do not match</span>
        }
      </div>
      <button type="submit" class="btn btn-primary full" [disabled]="form.invalid">Create account</button>
    </form>

    <div class="links"><a routerLink="/login">← Back to sign in</a></div>
  </div>
</div>
