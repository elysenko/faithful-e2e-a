<div class="auth-wrap" data-testid="app-ready">
  <div class="auth-card">
    <div class="brand"><span class="mark">◈</span> Nexus Power <span class="tag">Customer Portal</span></div>
    <h2>Customer sign in</h2>
    <p class="muted">Access your orders, documents and requests. You only ever see your own company's information.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" placeholder="you@company.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary full" [disabled]="form.invalid">Sign in</button>
    </form>

    <button class="btn demo-btn" (click)="demo()" data-testid="demo-mode">Enter portal — Demo (QES) →</button>
    <div class="links"><a routerLink="/login">Internal team sign in →</a></div>
  </div>
</div>
