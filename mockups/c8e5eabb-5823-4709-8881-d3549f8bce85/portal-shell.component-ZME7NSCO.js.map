<div class="portal" data-testid="app-ready">
  <header class="portal-top">
    <div class="portal-brand">
      <span class="brand-mark">◈</span>
      <div class="brand-text">
        <strong>Nexus Power</strong>
        <small>Customer Portal</small>
      </div>
    </div>
    <div class="portal-account">
      <span class="badge badge-info">QES — Quality Electrical Solutions</span>
    </div>
    <div class="portal-right">
      <span class="user-name">{{ auth.user()?.name }}</span>
      <button class="btn btn-sm" (click)="logout()">Sign out</button>
    </div>
  </header>

  <nav class="portal-nav">
    @for (item of nav; track item.route) {
      <a class="pnav-link" [routerLink]="item.route" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.route === '/portal' }">
        <span>{{ item.icon }}</span><span class="pnav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <main class="portal-content scroll-y">
    <router-outlet />
  </main>

  <nav class="portal-tabbar">
    @for (item of nav; track item.route) {
      <a class="ptab" [routerLink]="item.route" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.route === '/portal' }">
        <span class="ptab-icon">{{ item.icon }}</span>
        <span class="ptab-label">{{ item.label }}</span>
      </a>
    }
  </nav>
</div>
