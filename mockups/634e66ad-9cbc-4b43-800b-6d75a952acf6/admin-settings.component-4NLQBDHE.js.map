<section class="page">
  <div class="page-head">
    <div>
      <h1>Admin · Service Settings</h1>
      <p class="muted">Configure backing services for this deployment</p>
    </div>
  </div>

  <div class="svc-grid">
    @for (s of services(); track s.service) {
      <div class="svc card">
        <div class="svc-head">
          <h2>{{ s.label }}</h2>
          <span class="badge" [ngClass]="s.configured ? 'badge-success' : 'badge-warning'">
            {{ s.configured ? 'Configured' : 'Not configured' }}
          </span>
        </div>
        <p class="muted svc-key">{{ s.service }}</p>

        @for (f of s.fields; track f.key) {
          <div class="field">
            <label [attr.for]="s.service + '-' + f.key">{{ f.label }}</label>
            <div class="field-row">
              <input
                [id]="s.service + '-' + f.key"
                [type]="f.masked ? 'password' : 'text'"
                [(ngModel)]="f.value"
                [placeholder]="f.masked ? '••••••••' : 'Enter ' + f.label.toLowerCase()"
              />
              <button class="btn btn-primary sm" (click)="save(s.service, f.key, f.value)">
                {{ savedKey === s.service + ':' + f.key ? 'Saved ✓' : 'Save' }}
              </button>
            </div>
          </div>
        }
      </div>
    }
  </div>
</section>
