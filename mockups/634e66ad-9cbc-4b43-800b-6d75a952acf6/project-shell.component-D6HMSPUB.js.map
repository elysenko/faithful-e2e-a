@if (notFound()) {
  <div class="state card">
    <p class="empty-title">Project not found</p>
    <a class="btn btn-primary" routerLink="/projects">Back to projects</a>
  </div>
} @else {
  <div class="proj-head">
    <a class="back" routerLink="/projects">← Projects</a>
    <h1>{{ project()?.name }}</h1>
  </div>

  <nav class="tabs scroll-y">
    @for (t of tabs(); track t.path) {
      <a [routerLink]="t.path" routerLinkActive="active">
        <span class="tab-ico">{{ t.icon }}</span>
        <span class="tab-label">{{ t.label }}</span>
      </a>
    }
  </nav>

  <div class="tab-body">
    <router-outlet />
  </div>
}
