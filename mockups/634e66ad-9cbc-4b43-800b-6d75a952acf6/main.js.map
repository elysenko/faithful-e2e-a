@if (showChrome()) {
  <header class="app-header">
    <a class="brand" routerLink="/projects">
      <span class="brand-mark">▲</span>
      <span class="brand-name">SiteView</span>
    </a>

    <nav class="top-nav">
      <a routerLink="/projects" routerLinkActive="active">Projects</a>
      @if (auth.isPlanner()) {
        <a routerLink="/admin/settings" routerLinkActive="active">Admin</a>
      }
    </nav>

    <div class="header-right">
      <span class="user-chip">
        <span class="role-dot" [class.planner]="auth.isPlanner()"></span>
        {{ auth.user()?.name || 'User' }}
        <span class="role-label">{{ auth.isPlanner() ? 'Planner' : 'Viewer' }}</span>
      </span>
      <button class="btn btn-ghost logout" (click)="logout()">Logout</button>
    </div>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>

  <!-- Mobile bottom tab bar (≤768px) -->
  <nav class="bottom-nav">
    <a routerLink="/projects" routerLinkActive="active">
      <span class="ico">🏗️</span>
      <span>Projects</span>
    </a>
    @if (auth.isPlanner()) {
      <a routerLink="/admin/settings" routerLinkActive="active">
        <span class="ico">⚙️</span>
        <span>Admin</span>
      </a>
    }
    <button (click)="logout()">
      <span class="ico">↩︎</span>
      <span>Logout</span>
    </button>
  </nav>
} @else {
  <router-outlet />
}
