<div class="page">
  <header class="page-header">
    <h1 class="page-title">Settings</h1>
  </header>

  @if (user(); as u) {
    <section class="card account">
      <img [src]="u.pictureUrl" [alt]="u.name" width="56" height="56" />
      <div class="account-meta">
        <strong>{{ u.name }}</strong>
        <span class="muted">Signed in with LinkedIn</span>
      </div>
      @if (isAdmin()) { <span class="badge badge-admin">Admin</span> }
    </section>
  }

  <section class="card group">
    <h2 class="group-title">Notifications</h2>
    <label class="row">
      <span>New match alerts</span>
      <input type="checkbox" class="switch" [ngModel]="notifyMatches()" (ngModelChange)="notifyMatches.set($event)" />
    </label>
    <label class="row">
      <span>New message alerts</span>
      <input type="checkbox" class="switch" [ngModel]="notifyMessages()" (ngModelChange)="notifyMessages.set($event)" />
    </label>
  </section>

  <section class="card group">
    <h2 class="group-title">Discovery</h2>
    <label class="row">
      <span>Show my distance</span>
      <input type="checkbox" class="switch" [ngModel]="showDistance()" (ngModelChange)="showDistance.set($event)" />
    </label>
    <a class="row link-row" routerLink="/profile/edit">
      <span>Edit profile & photos</span>
      <span class="chev">›</span>
    </a>
  </section>

  @if (isAdmin()) {
    <section class="card group">
      <h2 class="group-title">Moderation</h2>
      <a class="row link-row" routerLink="/admin/moderation">
        <span>Admin dashboard</span>
        <span class="chev">›</span>
      </a>
      <a class="row link-row" routerLink="/admin/reports">
        <span>Reports queue</span>
        <span class="chev">›</span>
      </a>
    </section>
  }

  <section class="card group">
    <a class="row link-row" href="#"><span>Community guidelines</span><span class="chev">›</span></a>
    <a class="row link-row" href="#"><span>Privacy policy</span><span class="chev">›</span></a>
  </section>

  <button class="btn btn-outline btn-block logout" (click)="logout()" data-testid="logout">Log out</button>
  <p class="muted version">ProLink · v0.1.0 mockup</p>
</div>
