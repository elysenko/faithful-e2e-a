<div class="convo-page">
  <header class="convo-header">
    <a class="back" routerLink="/matches" aria-label="Back to matches">‹</a>
    <a class="peer" [routerLink]="['/users', partner().user.id]">
      <img [src]="partner().user.pictureUrl" [alt]="partner().user.name" width="40" height="40" />
      <div class="peer-meta">
        <strong>{{ partner().user.name }}</strong>
        <span class="muted">{{ partner().user.jobTitle }}</span>
      </div>
    </a>
    <a class="peer-view" [routerLink]="['/users', partner().user.id]" aria-label="View profile">ⓘ</a>
  </header>

  <div class="thread">
    <div class="match-banner">
      <img [src]="partner().user.pictureUrl" [alt]="partner().user.name" width="64" height="64" />
      <p>You matched with <strong>{{ partner().user.name }}</strong> · say hi</p>
    </div>

    @for (msg of thread(); track msg.id) {
      <div class="bubble-row" [class.mine]="msg.mine">
        <div class="bubble" [class.bubble-mine]="msg.mine">
          {{ msg.body }}
          <span class="bubble-time">{{ msg.createdAt }}</span>
        </div>
      </div>
    }
  </div>

  <form class="composer" (ngSubmit)="send()">
    <input
      class="composer-input"
      type="text"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      name="draft"
      placeholder="Message…"
      autocomplete="off"
      data-testid="message-input"
    />
    <button class="composer-send" type="submit" [disabled]="!draft().trim()" aria-label="Send">➤</button>
  </form>
</div>
