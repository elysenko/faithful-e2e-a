<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Tasks</h1>
      <p class="page-subtitle">{{ openCount() }} open</p>
    </div>
    <button class="btn btn-primary" (click)="openCreate()" data-testid="tasks-new">+ New task</button>
  </div>

  <div class="toolbar tabs">
    <button class="tab" [class.active]="filter() === 'all'" (click)="setFilter('all')">All</button>
    <button class="tab" [class.active]="filter() === 'Open'" (click)="setFilter('Open')" data-testid="tasks-filter-open">Open</button>
    <button class="tab" [class.active]="filter() === 'Done'" (click)="setFilter('Done')">Done</button>
  </div>

  <div class="card">
    <ul class="task-list">
      @for (t of filtered(); track t.id) {
        <li class="task-row" [class.done]="t.status === 'Done'" [attr.data-testid]="'task-row-' + t.id">
          <button class="check" (click)="toggle(t)" [attr.data-testid]="'task-toggle-' + t.id" aria-label="Toggle task">
            {{ t.status === 'Done' ? '✓' : '' }}
          </button>
          <div class="task-main">
            <div class="task-title">{{ t.title }}</div>
            @if (t.notes) { <div class="task-notes muted small">{{ t.notes }}</div> }
          </div>
          @if (t.dueDate) {
            <span class="badge" [class.badge-warning]="t.status === 'Open'">Due {{ t.dueDate | date: 'MMM d' }}</span>
          }
        </li>
      } @empty {
        <li class="muted empty">No tasks here.</li>
      }
    </ul>
  </div>
</div>

@if (showCreate()) {
  <div class="overlay" (click)="closeCreate()">
    <div class="modal" (click)="$event.stopPropagation()" data-testid="task-create-modal">
      <div class="modal-header">
        <h2 class="modal-title">New task</h2>
        <button class="btn-link" (click)="closeCreate()">✕</button>
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
          <label for="t-title">Title</label>
          <input id="t-title" class="input" formControlName="title" data-testid="task-title" placeholder="Call the client" />
        </div>
        <div class="field">
          <label for="t-due">Due date</label>
          <input id="t-due" class="input" type="date" formControlName="dueDate" />
        </div>
        <div class="field">
          <label for="t-notes">Notes</label>
          <textarea id="t-notes" class="textarea" formControlName="notes" placeholder="Optional details…"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" (click)="closeCreate()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid" data-testid="task-save">Create</button>
        </div>
      </form>
    </div>
  </div>
}
