<header class="navbar">
  <div class="navbar-inner">
    <button
      class="hamburger"
      type="button"
      (click)="toggleDrawer()"
      aria-label="Toggle navigation"
      data-testid="nav-hamburger"
    >
      <span></span><span></span><span></span>
    </button>

    <a class="brand" routerLink="/dashboard">
      <span class="brand-mark">◆</span>
      <span class="brand-name">Nimbus CRM</span>
    </a>

    <nav class="nav-links">
      @for (item of navItems; track item.path) {
        <a
          class="nav-link"
          [routerLink]="item.path"
          routerLinkActive="active"
          [attr.data-testid]="'nav-' + item.label.toLowerCase()"
        >{{ item.label }}</a>
      }
    </nav>

    <div class="nav-right">
      <div class="avatar" title="{{ user()?.name }}">{{ initials() }}</div>
      <button class="btn btn-ghost logout-btn" type="button" (click)="logout()" data-testid="nav-logout">
        Logout
      </button>
    </div>
  </div>
</header>

<!-- Mobile drawer -->
@if (drawerOpen()) {
  <div class="drawer-overlay" (click)="closeDrawer()" data-testid="nav-drawer-overlay"></div>
  <aside class="drawer" data-testid="nav-drawer">
    <div class="drawer-head">
      <div class="avatar">{{ initials() }}</div>
      <div class="drawer-user">
        <div class="drawer-name">{{ user()?.name ?? 'Demo Admin' }}</div>
        <div class="drawer-email muted">{{ user()?.email ?? 'demo@nimbus.crm' }}</div>
      </div>
    </div>
    <nav class="drawer-links">
      @for (item of navItems; track item.path) {
        <a
          class="drawer-link"
          [routerLink]="item.path"
          routerLinkActive="active"
          (click)="closeDrawer()"
        >
          <span class="drawer-icon">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>
    <button class="btn btn-ghost drawer-logout" type="button" (click)="logout()">Logout</button>
  </aside>
}

<main class="content">
  <router-outlet />
</main>
