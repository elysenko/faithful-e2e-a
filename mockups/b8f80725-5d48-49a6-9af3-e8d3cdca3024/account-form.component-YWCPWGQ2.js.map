<div class="page">
  <a class="crumb" routerLink="/accounts">← Accounts</a>
  <header class="page-head">
    <div>
      <h1>{{ isEdit() ? 'Edit account' : 'New account' }}</h1>
      <p class="muted">{{ isEdit() ? 'Update the account details.' : 'Add a company to your CRM.' }}</p>
    </div>
  </header>

  <form class="card card-pad form-narrow" [formGroup]="form" (ngSubmit)="save()">
    <div class="field">
      <label for="name">Account name *</label>
      <input id="name" class="input" formControlName="name" placeholder="Company name" />
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <span class="field-error">Account name is required.</span>
      }
    </div>

    <div class="field">
      <label for="industry">Industry</label>
      <select id="industry" class="select" formControlName="industry">
        @for (i of industries; track i) { <option [value]="i">{{ i }}</option> }
      </select>
    </div>

    <div class="field">
      <label for="website">Website</label>
      <input id="website" class="input" formControlName="website" placeholder="company.com" />
    </div>

    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" class="input" formControlName="phone" placeholder="+1 555 000 0000" />
    </div>

    <div class="field">
      <label for="city">City</label>
      <input id="city" class="input" formControlName="city" placeholder="City" />
    </div>

    <div class="field">
      <label for="employees">Employees</label>
      <input id="employees" class="input" type="number" formControlName="employees" min="0" />
    </div>

    <div class="field">
      <label for="annualRevenue">Annual revenue (USD)</label>
      <input id="annualRevenue" class="input" type="number" formControlName="annualRevenue" min="0" />
    </div>

    <div class="form-actions">
      <button type="button" class="btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary">{{ isEdit() ? 'Save changes' : 'Create account' }}</button>
    </div>
  </form>
</div>
