<div class="page">
  <a routerLink="/catalog" class="back" data-testid="back-to-catalog">← Back to catalog</a>

  @if (product(); as p) {
    <div class="detail">
      <div class="detail-media card">
        <img [src]="p.imageUrl" [alt]="p.name" width="560" height="560" />
      </div>

      <div class="detail-info">
        <h1>{{ p.name }}</h1>
        <div class="price-row">
          <span class="price">{{ p.priceCents | money }}</span>
          @if (p.stockQty > 0) {
            <span class="badge badge-success">In stock · {{ p.stockQty }}</span>
          } @else {
            <span class="badge badge-warning">Out of stock</span>
          }
        </div>

        <p class="detail-desc">{{ p.description }}</p>

        <div class="buy-row">
          <div class="qty" role="group" aria-label="Quantity">
            <button class="qty-btn" (click)="changeQty(-1)" [disabled]="qty() <= 1" aria-label="Decrease">−</button>
            <span class="qty-val" data-testid="detail-qty">{{ qty() }}</span>
            <button class="qty-btn" (click)="changeQty(1)" [disabled]="qty() >= p.stockQty" aria-label="Increase">+</button>
          </div>
          <button
            class="btn btn-primary buy-btn"
            (click)="addToCart()"
            [disabled]="p.stockQty <= 0"
            data-testid="detail-add"
          >
            {{ p.stockQty <= 0 ? 'Out of stock' : 'Add to cart' }}
          </button>
        </div>

        @if (added()) {
          <div class="added-note" data-testid="detail-added">
            Added to cart. <a routerLink="/cart">View cart →</a>
          </div>
        }
      </div>
    </div>
  } @else {
    <div class="card empty">
      <p>Product not found.</p>
      <a routerLink="/catalog" class="btn btn-primary">Browse catalog</a>
    </div>
  }
</div>
