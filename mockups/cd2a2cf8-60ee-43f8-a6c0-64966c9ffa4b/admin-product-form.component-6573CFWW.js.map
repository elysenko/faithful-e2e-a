<div class="card form-panel" data-testid="product-form">
  <div class="form-head">
    <h2>{{ editingId() ? 'Edit product' : 'New product' }}</h2>
    <button class="icon-btn" (click)="close()" aria-label="Close" data-testid="form-close">✕</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" data-testid="form-name" placeholder="Product name" />
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <span class="error">Name is required</span>
      }
    </div>

    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" rows="3" formControlName="description" data-testid="form-description"
        placeholder="Short description"></textarea>
      @if (form.get('description')?.invalid && form.get('description')?.touched) {
        <span class="error">Description is required</span>
      }
    </div>

    <div class="field-row">
      <div class="field">
        <label for="priceDollars">Price (USD)</label>
        <input id="priceDollars" type="number" min="0" step="0.01" formControlName="priceDollars"
          data-testid="form-price" />
      </div>
      <div class="field">
        <label for="stockQty">Stock quantity</label>
        <input id="stockQty" type="number" min="0" step="1" formControlName="stockQty"
          data-testid="form-stock" />
      </div>
    </div>

    <div class="field">
      <label for="imageUrl">Image URL <span class="muted">(optional)</span></label>
      <input id="imageUrl" type="url" formControlName="imageUrl" data-testid="form-image"
        placeholder="https://…" />
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="close()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid" data-testid="form-save">
        {{ editingId() ? 'Save changes' : 'Create product' }}
      </button>
    </div>
  </form>
</div>
