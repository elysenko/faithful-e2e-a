<div class="container stack">
  <nav class="breadcrumb">
    <a routerLink="/customers">Customers</a>
    <span class="faint">/</span>
    <span>New customer</span>
  </nav>

  <div class="section-title">
    <span class="eyebrow">Directory</span>
    <h2>New customer</h2>
  </div>

  <form
    class="card card-pad stack"
    style="max-width: 640px"
    [formGroup]="form"
    (ngSubmit)="submit()"
  >
    <div class="field">
      <label for="name">Name</label>
      <input
        id="name"
        class="input"
        type="text"
        formControlName="name"
        [class.input-invalid]="form.controls.name.invalid && form.controls.name.touched"
      />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <span class="field-error">Name is required.</span>
      }
    </div>

    <div class="field">
      <label for="contactName">Contact name</label>
      <input id="contactName" class="input" type="text" formControlName="contactName" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input
        id="email"
        class="input"
        type="email"
        formControlName="email"
        [class.input-invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <span class="field-error">Enter a valid email address.</span>
      }
    </div>

    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" class="input" type="text" formControlName="phone" />
    </div>

    <div class="field">
      <label for="address">Address</label>
      <textarea id="address" class="textarea" rows="3" formControlName="address"></textarea>
    </div>

    <div class="row">
      <button type="submit" class="btn btn-primary">Create customer</button>
      <a routerLink="/customers" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
