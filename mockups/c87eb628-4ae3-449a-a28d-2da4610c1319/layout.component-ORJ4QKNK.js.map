<div class="erp-shell">
  <!-- Sidebar (desktop static / mobile drawer) -->
  <aside class="erp-sidebar" [class.open]="sidebarOpen()">
    <div class="erp-brand">
      <span class="erp-brand-mark">M</span>
      <span class="erp-brand-name">MiniERP</span>
    </div>

    <nav class="erp-nav">
      <div class="erp-nav-group">Menu</div>
      @for (item of visibleNav(); track item.path) {
        <a
          class="erp-nav-item"
          [routerLink]="item.path"
          routerLinkActive="active"
          (click)="closeSidebar()"
        >
          <span class="erp-nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="erp-sidebar-foot">
      <div class="erp-user">
        <span class="erp-avatar">{{ initials() }}</span>
        <span>
          <div>{{ user()?.email }}</div>
          <div class="text-xs" style="color: var(--color-faint); text-transform: uppercase;">{{ role() }}</div>
        </span>
      </div>
      <button class="btn btn-dark btn-block btn-sm" (click)="logout()">Log out</button>
    </div>
  </aside>

  <!-- Mobile scrim -->
  <div class="erp-scrim" [class.show]="sidebarOpen()" (click)="closeSidebar()"></div>

  <div class="erp-main">
    <header class="erp-header">
      <button class="erp-hamburger" (click)="toggleSidebar()" aria-label="Toggle menu">☰</button>
      <h1>MiniERP</h1>
      <span class="spacer"></span>
      <span class="badge badge-neutral">{{ role() }}</span>
    </header>

    <main class="erp-content">
      <div class="erp-content-inner">
        <router-outlet />
      </div>
    </main>
  </div>

  <!-- Mobile bottom tab bar -->
  <nav class="mobile-tabbar">
    @for (item of tabNav(); track item.path) {
      <a class="mobile-tab" [routerLink]="item.path" routerLinkActive="active">
        <span class="mobile-tab-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
    <button class="mobile-tab" (click)="toggleSidebar()">
      <span class="mobile-tab-icon">☰</span>
      <span>More</span>
    </button>
  </nav>
</div>
