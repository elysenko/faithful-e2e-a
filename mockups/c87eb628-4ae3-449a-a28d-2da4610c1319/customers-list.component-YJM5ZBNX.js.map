<div class="container stack">
  <div class="row-between section-title">
    <div class="stack">
      <span class="eyebrow">Directory</span>
      <h2>Customers</h2>
    </div>
    <a routerLink="/customers/new" class="btn btn-primary">New customer</a>
  </div>

  <div class="filter-bar">
    <input
      class="input"
      type="text"
      placeholder="Search by name, contact, or email"
      [value]="query()"
      (input)="query.set($any($event.target).value)"
    />
  </div>

  @if (filtered().length === 0) {
    <div class="state">
      <div class="state-icon">🔍</div>
      <p class="muted">No customers match your search.</p>
    </div>
  } @else {
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody>
          @for (c of filtered(); track c.id) {
            <tr class="clickable" [routerLink]="['/customers', c.id]">
              <td><a [routerLink]="['/customers', c.id]">{{ c.name }}</a></td>
              <td>{{ c.contactName }}</td>
              <td>{{ c.email }}</td>
              <td>{{ c.phone }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
