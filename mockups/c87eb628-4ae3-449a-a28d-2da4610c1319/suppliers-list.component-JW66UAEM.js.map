<div class="container stack">
  <div class="section-title">
    <span class="eyebrow">Directory</span>
    <h2>Suppliers</h2>
  </div>

  @if (suppliers().length) {
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody>
          @for (s of suppliers(); track s.id) {
            <tr [routerLink]="['/suppliers', s.id]">
              <td><a [routerLink]="['/suppliers', s.id]">{{ s.name }}</a></td>
              <td>{{ s.contactName }}</td>
              <td class="muted">{{ s.email }}</td>
              <td class="muted">{{ s.phone }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  } @else {
    <div class="state">
      <div class="state-icon">📭</div>
      <p class="muted">No suppliers found.</p>
    </div>
  }
</div>
