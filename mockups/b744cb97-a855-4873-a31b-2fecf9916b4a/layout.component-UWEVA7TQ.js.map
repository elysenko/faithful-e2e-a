<div class="bw-shell">
  <header class="bw-header">
    <a class="bw-brand" routerLink="/bills">
      <span class="bw-brand-mark">🐝</span>
      <span class="bw-brand-name">BeehiveWatch</span>
    </a>

    <nav class="bw-topnav" aria-label="Primary">
      @for (item of nav; track item.path) {
        <a class="bw-topnav-link" [routerLink]="item.path" routerLinkActive="active">
          <span class="bw-nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="bw-header-right">
      @if (isEditor()) {
        <span class="bw-user-chip">{{ user()?.email }}</span>
        <button type="button" class="btn btn-outline btn-sm" (click)="logout()">Logout</button>
      } @else {
        <a class="btn btn-primary btn-sm" routerLink="/login">Editor login</a>
      }
    </div>
  </header>

  <main class="bw-content">
    <div class="bw-content-inner">
      <router-outlet />
    </div>
  </main>

  <!-- Mobile bottom tab bar (≤5 items) -->
  <nav class="bw-tabbar" aria-label="Primary mobile">
    @for (item of nav; track item.path) {
      <a class="bw-tab" [routerLink]="item.path" routerLinkActive="active">
        <span class="bw-tab-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
    @if (isEditor()) {
      <button type="button" class="bw-tab" (click)="logout()">
        <span class="bw-tab-icon">⎋</span>
        <span>Logout</span>
      </button>
    } @else {
      <a class="bw-tab" routerLink="/login" routerLinkActive="active">
        <span class="bw-tab-icon">🔑</span>
        <span>Login</span>
      </a>
    }
  </nav>
</div>
