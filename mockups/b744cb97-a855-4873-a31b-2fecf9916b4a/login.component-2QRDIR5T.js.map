<div class="login-wrap">
  <div class="card login-card">
    <div class="login-head">
      <span class="login-mark">🐝</span>
      <h1>BeehiveWatch</h1>
      <p class="muted">Editor sign-in — public browsing needs no account.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
      </div>

      @if (errorMessage()) {
        <p class="error" role="alert">{{ errorMessage() }}</p>
      }

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <div class="login-alt">
      <button type="button" class="demo-link" (click)="demoLogin()">Skip login — Demo Mode</button>
      <a routerLink="/bills" class="browse-link">Browse as a visitor →</a>
    </div>
  </div>
</div>
