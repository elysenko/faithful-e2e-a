<a routerLink="/bills" class="back-link">← All bills</a>

<div class="card form-card">
  <h1>{{ isEdit() ? 'Edit bill' : 'New bill' }}</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-grid">
      <div class="field">
        <label for="number">Bill number</label>
        <input id="number" type="text" formControlName="number" placeholder="HB0042" />
      </div>
      <div class="field">
        <label for="session">Session</label>
        <input id="session" type="number" formControlName="session" />
      </div>
    </div>

    <div class="field">
      <label for="title">Title</label>
      <input id="title" type="text" formControlName="title" placeholder="Short bill title" />
    </div>

    <div class="field">
      <label for="summary">Summary</label>
      <textarea id="summary" formControlName="summary" rows="4" placeholder="Plain-language summary…"></textarea>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="status">Status</label>
        <select id="status" formControlName="status">
          @for (s of statuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label for="sectors">Sectors</label>
        <input id="sectors" type="text" formControlName="sectors" placeholder="energy, environment" />
        <span class="hint muted">Comma-separated, lowercase.</span>
      </div>
    </div>

    <div class="form-foot">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving…' : (isEdit() ? 'Save changes' : 'Create bill') }}
      </button>
    </div>
  </form>
</div>
