<a routerLink="/legislators" class="back-link">← All legislators</a>

<div class="card form-card">
  <h1>{{ isEdit() ? 'Edit legislator' : 'New legislator' }}</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" placeholder="Sen. Jane Doe" />
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="chamber">Chamber</label>
        <select id="chamber" formControlName="chamber">
          @for (c of chambers; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label for="district">District</label>
        <input id="district" type="text" formControlName="district" placeholder="S-12" />
      </div>
    </div>

    <div class="field">
      <label for="party">Party</label>
      <input id="party" type="text" formControlName="party" placeholder="Republican / Democrat / Independent" />
    </div>

    <div class="form-foot">
      <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving…' : (isEdit() ? 'Save changes' : 'Create legislator') }}
      </button>
    </div>
  </form>
</div>
