<section class="page stack">
  <header class="page-head">
    <a routerLink="/tenants" class="back-link">← Back to Tenants</a>
    <h1>New Tenant</h1>
    <p class="muted">Create a sign-in for a tenant or manager.</p>
  </header>

  <div class="card card-pad">
    <form class="stack" [formGroup]="form" (ngSubmit)="submit()">
      <label class="stack">
        <span>Name</span>
        <input
          class="field"
          type="text"
          formControlName="name"
          autocomplete="name"
          placeholder="Full name"
        />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <small class="error">Name is required.</small>
        }
      </label>

      <label class="stack">
        <span>Email</span>
        <input
          class="field"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tenant@demo"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="error">Enter a valid email address.</small>
        }
      </label>

      <label class="stack">
        <span>Password</span>
        <input
          class="field"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="At least 6 characters"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="error">Password must be at least 6 characters.</small>
        }
      </label>

      <label class="stack">
        <span>Role</span>
        <select class="field" formControlName="role">
          <option value="tenant">Tenant</option>
          <option value="manager">Manager</option>
        </select>
      </label>

      <p class="muted note">
        The tenant signs in with these credentials to view their lease and pay.
      </p>

      <div class="row form-actions">
        <button type="button" class="btn btn-outline" (click)="cancel()" [disabled]="loading()">
          Cancel
        </button>
        <span class="spacer"></span>
        <button class="btn btn-primary" type="submit" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span>
          } @else {
            Create Tenant
          }
        </button>
      </div>
    </form>
  </div>
</section>
