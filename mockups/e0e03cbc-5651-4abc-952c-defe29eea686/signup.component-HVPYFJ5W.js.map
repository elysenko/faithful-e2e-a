<div class="auth-shell">
  <div class="auth-card card">
    <div class="brand">
      <span class="brand-mark">R</span>
      <h1 class="brand-name">RentDesk</h1>
    </div>
    <p class="muted brand-tagline">Create your account</p>

    <form class="stack" [formGroup]="form" (ngSubmit)="submit()">
      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <label class="stack">
        <span>Name</span>
        <input
          class="field"
          type="text"
          formControlName="name"
          autocomplete="name"
          placeholder="Your full name"
        />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <small class="error">Name is required.</small>
        }
      </label>

      <label class="stack">
        <span>Email</span>
        <input
          class="field"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@example.com"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="error">Enter a valid email address.</small>
        }
      </label>

      <label class="stack">
        <span>Password</span>
        <input
          class="field"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="At least 6 characters"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="error">Password must be at least 6 characters.</small>
        }
      </label>

      <label class="stack">
        <span>Confirm password</span>
        <input
          class="field"
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Re-enter your password"
        />
        @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid) {
          <small class="error">Please confirm your password.</small>
        } @else if (passwordMismatch) {
          <small class="error">Passwords do not match.</small>
        }
      </label>

      <button
        class="btn btn-primary btn-block"
        type="submit"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          Create account
        }
      </button>
    </form>

    <div class="auth-footer stack">
      <p class="muted note">
        The first account becomes the Manager; later accounts are created by a manager.
      </p>
      <a routerLink="/login" class="signin-link">Already have an account? Sign in</a>
    </div>
  </div>
</div>
