<div class="auth-shell">
  <div class="auth-card card">
    <div class="brand">
      <span class="brand-mark">R</span>
      <h1 class="brand-name">RentDesk</h1>
    </div>
    <p class="muted brand-tagline">Sign in to your rent portal</p>

    <form class="stack" [formGroup]="form" (ngSubmit)="submit()">
      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <label class="stack">
        <span>Email</span>
        <input
          class="field"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@example.com"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="error">Enter a valid email address.</small>
        }
      </label>

      <label class="stack">
        <span>Password</span>
        <input
          class="field"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Your password"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="error">Password is required.</small>
        }
      </label>

      <button
        class="btn btn-primary btn-block"
        type="submit"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          Sign in
        }
      </button>
    </form>

    <div class="demo-row">
      <button type="button" class="btn btn-sm demo-link" (click)="demoManager()">
        Skip login — Demo Mode
      </button>
      <button type="button" class="btn btn-sm demo-link" (click)="demoTenant()">
        Demo as tenant
      </button>
    </div>

    <div class="auth-footer stack">
      <a routerLink="/signup" class="create-link">Create an account</a>
      <p class="muted creds-hint">
        Seeded demo: manager&#64;demo / tenant1&#64;demo · password demo1234
      </p>
    </div>
  </div>
</div>
