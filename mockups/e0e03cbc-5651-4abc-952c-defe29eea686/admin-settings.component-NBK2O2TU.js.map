<section class="page stack">
  <header class="page-head">
    <h1>Settings</h1>
    <p class="muted">Service configuration.</p>
  </header>

  <form [formGroup]="form" class="stack">
    @for (group of groups(); track group.service) {
      <div class="card card-pad service stack">
        <div class="row service-head">
          <h2 class="service-name">{{ group.label }}</h2>
          <span class="spacer"></span>
          @if (group.configured) {
            <span class="badge badge-ok">Configured</span>
          } @else {
            <span class="badge badge-warn">Not configured</span>
          }
        </div>

        @for (s of group.settings; track s.key) {
          <label class="stack">
            <span>{{ s.label }}</span>
            <input
              class="field"
              type="text"
              [formControlName]="s.key"
              [placeholder]="s.value ? s.value : 'Enter ' + s.label"
              autocomplete="off"
            />
          </label>
        }

        <div class="row form-actions">
          <span class="spacer"></span>
          <button
            type="button"
            class="btn btn-primary"
            (click)="save(group)"
            [disabled]="savingService() === group.service"
          >
            @if (savingService() === group.service) {
              <span class="spinner"></span>
            } @else {
              Save
            }
          </button>
        </div>
      </div>
    }
  </form>
</section>
