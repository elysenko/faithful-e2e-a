<div class="page">
  <div class="page-header row-between">
    <div>
      <h1 class="page-title">Shop the catalog</h1>
      <p class="page-sub">Free shipping on orders over $75 — {{ filtered().length }} products available.</p>
    </div>
    <div class="search">
      <input
        type="search"
        placeholder="Search products…"
        [value]="query()"
        (input)="onSearch($any($event.target).value)"
        aria-label="Search products"
      />
    </div>
  </div>

  @if (filtered().length === 0) {
    <div class="card card-pad empty">
      <p class="muted">No products match “{{ query() }}”.</p>
      <button type="button" class="btn btn-sm" (click)="onSearch('')">Clear search</button>
    </div>
  } @else {
    <div class="grid catalog-grid">
      @for (product of filtered(); track product.id) {
        <app-product-card [product]="product" (addToCart)="addToCart($event)" />
      }
    </div>
  }
</div>
