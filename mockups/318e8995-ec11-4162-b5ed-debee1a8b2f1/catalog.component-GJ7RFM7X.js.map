<a class="product-card" [routerLink]="['/products', product.id]">
  <div class="thumb">
    <img [src]="product.imageUrl" [alt]="product.name" width="400" height="300" loading="lazy" />
    @if (product.stockQty === 0) {
      <span class="badge badge-danger stock-flag">Out of stock</span>
    } @else if (product.stockQty <= 5) {
      <span class="badge badge-warning stock-flag">Low stock</span>
    }
  </div>
  <div class="body">
    <h3 class="name">{{ product.name }}</h3>
    <p class="desc muted">{{ product.description }}</p>
    <div class="foot">
      <span class="price">{{ product.priceCents | money }}</span>
      <button
        type="button"
        class="btn btn-sm btn-primary"
        [disabled]="product.stockQty === 0"
        (click)="onAdd($event)"
      >
        Add
      </button>
    </div>
  </div>
</a>
