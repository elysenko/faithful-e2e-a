<div class="auth-shell">
  <div class="auth-card card">
    <div class="auth-brand">
      <span class="brand-mark">&lt;/&gt;</span>
      <span class="brand-name">CodeDeck</span>
    </div>
    <h1>Create your account</h1>
    <p class="muted">The first account becomes the admin; later teammates default to the developer role.</p>

    <form (ngSubmit)="submit()" data-testid="signup-form">
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" type="text" name="name" [(ngModel)]="name"
               autocomplete="name" placeholder="Ada Lovelace" data-testid="signup-name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" [(ngModel)]="email"
               autocomplete="email" placeholder="you@example.com" data-testid="signup-email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" [(ngModel)]="password"
               autocomplete="new-password" placeholder="At least 8 characters" data-testid="signup-password" />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" name="confirm" [(ngModel)]="confirm"
               autocomplete="new-password" placeholder="Re-enter password" />
      </div>
      <div class="field">
        <label for="role">Requested role</label>
        <select id="role" name="role" [(ngModel)]="role" data-testid="signup-role">
          @for (r of roles; track r) { <option [value]="r">{{ r }}</option> }
        </select>
        <span class="hint">The very first account always becomes an admin.</span>
      </div>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button type="submit" class="btn btn-primary btn-block" [disabled]="submitting()" data-testid="signup-submit">
        {{ submitting() ? 'Creating…' : 'Create account' }}
      </button>
    </form>

    <p class="auth-alt">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
