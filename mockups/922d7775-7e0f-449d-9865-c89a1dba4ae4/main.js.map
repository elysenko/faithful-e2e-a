<!-- SMOKE_MARKER: CodeDeck -->
<header class="app-header no-print">
  <a class="brand" routerLink="/" data-testid="layout-brand">
    <span class="brand-mark">&lt;/&gt;</span>
    <span class="brand-name">CodeDeck</span>
  </a>

  <nav class="top-nav">
    @for (item of nav(); track item.link) {
      <a
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: !!item.exact }"
        class="top-nav-link"
        [attr.data-testid]="item.link === '/' ? 'nav-workspaces' : (item.link === '/admin/users' ? 'nav-admin-users' : null)"
      >{{ item.label }}</a>
    }
  </nav>

  <div class="header-right">
    <span class="user-chip">
      <span class="role-dot" [class.admin]="auth.isAdmin()"></span>
      <span class="user-name" data-testid="nav-user-email">{{ userName() }}</span>
      <span class="role-tag" data-testid="role-label">{{ roleLabel() }}</span>
    </span>
    <button type="button" class="btn btn-outline btn-sm" (click)="logout()" data-testid="nav-logout">Sign out</button>
  </div>
</header>

<div class="app-main">
  <router-outlet />
</div>

<!-- Mobile bottom tab bar (≤768px) -->
<nav class="bottom-nav no-print" aria-label="Primary navigation">
  @for (item of nav(); track item.link) {
    <a
      [routerLink]="item.link"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: !!item.exact }"
      class="bottom-nav-link"
    >
      <span class="bn-icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="bn-label">{{ item.label }}</span>
    </a>
  }
  <button type="button" class="bottom-nav-link bn-signout" (click)="logout()">
    <span class="bn-icon" aria-hidden="true">🚪</span>
    <span class="bn-label">Sign out</span>
  </button>
</nav>
