<ul class="tree" [class.tree-root]="depth === 0"
    [attr.data-testid]="depth === 0 ? 'file-tree-root' : null">
  @for (node of nodes; track node.id) {
    <li class="tree-item" data-testid="file-tree-node">
      @if (node.type === 'folder') {
        <div
          class="node folder"
          [class.drag-over]="dragOverId === node.id"
          [style.paddingLeft.px]="8 + depth * 14"
          draggable="true"
          (dragstart)="onDragStart($event, node)"
          (dragover)="onDragOver($event, node)"
          (dragleave)="onDragLeave(node)"
          (drop)="onDrop($event, node)"
        >
          <button type="button" class="twisty" (click)="toggle(node)"
                  [attr.aria-label]="(isExpanded(node) ? 'Collapse ' : 'Expand ') + node.name">
            {{ isExpanded(node) ? '▾' : '▸' }}
          </button>
          <span class="node-icon" aria-hidden="true">📁</span>
          <span class="node-name" (click)="toggle(node)">{{ node.name }}</span>
          <span class="node-actions">
            <button type="button" data-testid="file-tree-create-btn" (click)="createNode.emit({ parentId: node.id, type: 'file' }); $event.stopPropagation()" title="New file" aria-label="New file">＋📄</button>
            <button type="button" (click)="createNode.emit({ parentId: node.id, type: 'folder' }); $event.stopPropagation()" title="New folder" aria-label="New folder">＋📁</button>
            <button type="button" (click)="renameNode.emit(node.id); $event.stopPropagation()" title="Rename" aria-label="Rename">✎</button>
            <button type="button" (click)="removeNode.emit(node.id); $event.stopPropagation()" title="Delete" aria-label="Delete">🗑</button>
          </span>
        </div>

        @if (isExpanded(node) && node.children && node.children.length) {
          <app-file-tree
            [nodes]="node.children"
            [activeId]="activeId"
            [depth]="depth + 1"
            (select)="select.emit($event)"
            (createNode)="createNode.emit($event)"
            (renameNode)="renameNode.emit($event)"
            (removeNode)="removeNode.emit($event)"
            (moveNode)="moveNode.emit($event)"
          />
        }
      } @else {
        <div
          class="node file"
          [class.active]="activeId === node.id"
          [style.paddingLeft.px]="26 + depth * 14"
          draggable="true"
          (dragstart)="onDragStart($event, node)"
          (click)="select.emit(node.id)"
        >
          <span class="node-icon" aria-hidden="true">{{ iconFor(node.name) }}</span>
          <span class="node-name">{{ node.name }}</span>
          <span class="node-actions">
            <button type="button" (click)="renameNode.emit(node.id); $event.stopPropagation()" title="Rename" aria-label="Rename">✎</button>
            <button type="button" (click)="removeNode.emit(node.id); $event.stopPropagation()" title="Delete" aria-label="Delete">🗑</button>
          </span>
        </div>
      }
    </li>
  }
</ul>
