<div class="editor-wrap" data-testid="code-editor-host">
  <div class="editor-status">
    <span class="lang-badge">{{ language }}</span>
    <span class="status-spacer"></span>
    <span class="status-meta">{{ lineCount }} lines · Ctrl/⌘+S to save</span>
  </div>
  <div class="editor-scroll">
    <div class="gutter" aria-hidden="true">
      @for (n of lines; track n) {
        <span class="gutter-line">{{ n }}</span>
      }
    </div>
    <textarea
      class="code-area mono"
      [ngModel]="text"
      (ngModelChange)="onInput($event)"
      (keydown.control.s)="onSave($event)"
      (keydown.meta.s)="onSave($event)"
      spellcheck="false"
      autocapitalize="off"
      autocomplete="off"
      autocorrect="off"
      wrap="off"
    ></textarea>
  </div>
</div>
