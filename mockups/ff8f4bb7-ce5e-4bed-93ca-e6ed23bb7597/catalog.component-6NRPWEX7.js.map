<a class="product-card" [routerLink]="['/products', product.id]">
  <div class="thumb">
    @if (product.imageUrl) {
      <img [src]="product.imageUrl" [alt]="product.name" width="240" height="160" loading="lazy" />
    } @else {
      <div class="thumb-placeholder" aria-hidden="true">IFS</div>
    }
    @if (outOfStock) {
      <span class="badge badge-danger stock-flag">Out of stock</span>
    }
  </div>
  <div class="body">
    <h3 class="name">{{ product.name }}</h3>
    <p class="desc">{{ product.description }}</p>
    <div class="foot">
      <span class="price">{{ format(product.priceCents) }}</span>
      @if (!outOfStock) {
        <span class="stock muted">{{ product.stockQty }} in stock</span>
      }
    </div>
  </div>
</a>
