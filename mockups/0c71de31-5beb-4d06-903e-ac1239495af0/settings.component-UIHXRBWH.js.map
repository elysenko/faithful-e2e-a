<section class="page">
  <header class="page-head">
    <div>
      <h1 class="page-title">Backing services</h1>
      <p class="muted">Configure the credentials CodeDeck uses for its backing services.</p>
    </div>
  </header>

  <div class="settings-list" data-testid="settings-list">
    @for (s of settings(); track s.key) {
      <article class="svc card" [attr.data-testid]="'setting-' + s.key">
        <div class="svc-head">
          <div>
            <h2 class="svc-name">{{ s.label }}</h2>
            <code class="svc-key muted">{{ s.key }}</code>
          </div>
          @if (s.configured) {
            <span class="badge badge-ok" data-testid="status-configured">● Configured</span>
          } @else {
            <span class="badge badge-off" data-testid="status-unconfigured">● Not configured</span>
          }
        </div>

        @if (s.configured) {
          <div class="field">
            <label>Current value</label>
            <input type="text" [value]="s.value" readonly />
          </div>
        }

        <div class="field">
          <label [attr.for]="'draft-' + s.key">{{ s.configured ? 'Update credentials' : 'Set credentials' }}</label>
          <input [id]="'draft-' + s.key" type="password" [(ngModel)]="drafts[s.key]"
                 [attr.data-testid]="'input-' + s.key" placeholder="Connection string / secret" />
        </div>

        <div class="svc-actions">
          @if (savedKey() === s.key) { <span class="badge badge-ok">Saved</span> }
          <button type="button" class="btn btn-primary btn-sm" [disabled]="!(drafts[s.key] || '').trim()"
                  (click)="save(s)" [attr.data-testid]="'save-' + s.key">Save</button>
        </div>
      </article>
    }
  </div>
</section>
