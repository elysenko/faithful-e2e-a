@if (showShell()) {
  <header class="topbar">
    <a class="brand" routerLink="/workspaces">
      <span class="brand-mark">&lt;/&gt;</span>
      <span class="brand-text">CodeDeck</span>
    </a>

    <nav class="topnav">
      <a routerLink="/workspaces" routerLinkActive="active" class="topnav-link">Workspaces</a>
      @if (auth.isAdmin()) {
        <a routerLink="/admin/settings" routerLinkActive="active" class="topnav-link">Settings</a>
      }
    </nav>

    <div class="topbar-right">
      <span class="user-chip" data-testid="current-user">{{ auth.user()?.name || 'Account' }}</span>
      <button type="button" class="btn btn-outline btn-sm" data-testid="logout-btn" (click)="logout()">Logout</button>
    </div>
  </header>
}

<main class="app-main" [class.with-shell]="showShell()">
  <router-outlet />
</main>

@if (showShell()) {
  <nav class="bottomnav" aria-label="Primary">
    <a routerLink="/workspaces" routerLinkActive="active" class="bottomnav-item">
      <span class="bn-icon">🗂️</span>
      <span class="bn-label">Workspaces</span>
    </a>
    @if (auth.isAdmin()) {
      <a routerLink="/admin/settings" routerLinkActive="active" class="bottomnav-item">
        <span class="bn-icon">⚙️</span>
        <span class="bn-label">Settings</span>
      </a>
    }
    <button type="button" class="bottomnav-item" (click)="logout()">
      <span class="bn-icon">⎋</span>
      <span class="bn-label">Logout</span>
    </button>
  </nav>
}
