<!-- SMOKE_MARKER: GatherUp -->
<header class="app-header no-print">
  <a class="brand" routerLink="/">
    <span class="brand-mark">G</span>
    <span class="brand-name">GatherUp</span>
  </a>

  <nav class="top-nav">
    @for (item of nav(); track item.link) {
      <a
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: !!item.exact }"
        class="top-nav-link"
      >{{ item.label }}</a>
    }
  </nav>

  <div class="header-right">
    @if (auth.isLoggedIn()) {
      <span class="user-chip">
        <span class="role-dot" [class.organizer]="auth.isOrganizer()"></span>
        <span class="user-name">{{ userName() }}</span>
        <span class="role-tag">{{ roleLabel() }}</span>
      </span>
      <button type="button" class="btn btn-outline btn-sm" (click)="logout()">Sign out</button>
    } @else {
      <a routerLink="/login" class="btn btn-outline btn-sm">Log in</a>
      <a routerLink="/signup" class="btn btn-primary btn-sm">Sign up</a>
    }
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>

<!-- Bottom tab bar — mobile only -->
<nav class="bottom-nav no-print" aria-label="Primary">
  @for (item of bottomNav(); track item.link) {
    <a
      [routerLink]="item.link"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: !!item.exact }"
      class="bottom-nav-item"
    >
      <span class="bn-icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="bn-label">{{ item.label }}</span>
    </a>
  }
  @if (auth.isLoggedIn()) {
    <button type="button" class="bottom-nav-item" (click)="logout()">
      <span class="bn-icon" aria-hidden="true">⎋</span>
      <span class="bn-label">Sign out</span>
    </button>
  } @else {
    <a routerLink="/login" routerLinkActive="active" class="bottom-nav-item">
      <span class="bn-icon" aria-hidden="true">👤</span>
      <span class="bn-label">Log in</span>
    </a>
  }
</nav>
