<!-- SMOKE_MARKER: GatherUp -->
<div class="page narrow">
  <a routerLink="/organizer/venues" class="back-link">← Venues</a>
  <div class="page-head">
    <h1>{{ isEdit() ? 'Edit venue' : 'New venue' }}</h1>
  </div>

  <form class="card card-pad" (ngSubmit)="save()">
    <div class="field">
      <label for="name">Venue name</label>
      <input id="name" name="name" [(ngModel)]="form.name" placeholder="The Warehouse" />
    </div>
    <div class="field">
      <label for="address">Address</label>
      <input id="address" name="address" [(ngModel)]="form.address" placeholder="12 Dock Road, Riverside" />
    </div>
    <div class="field">
      <label for="cap">Default capacity</label>
      <input id="cap" name="cap" type="number" min="1" [(ngModel)]="form.defaultCapacity" />
      <span class="hint">Used to pre-fill capacity when creating events at this venue.</span>
    </div>

    @if (error()) { <p class="error">{{ error() }}</p> }

    <div class="form-actions">
      <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving…' : (isEdit() ? 'Save changes' : 'Create venue') }}
      </button>
    </div>
  </form>
</div>
