<div class="overlay" (click)="dismiss.emit()">
  <div class="sheet" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <div class="grabber" aria-hidden="true"></div>

    @if (!done()) {
      <h2 class="sheet-title">Report {{ targetName }}</h2>
      <p class="muted sheet-sub">
        Reports are confidential and reviewed by our moderation team. {{ targetName }}
        won't know you reported them.
      </p>

      <label for="report-reason">Reason</label>
      <div class="reasons">
        @for (r of reasons; track r) {
          <button
            type="button"
            class="reason-chip"
            [class.selected]="reason() === r"
            (click)="reason.set(r)"
          >{{ r }}</button>
        }
      </div>

      <label for="report-detail">Add detail (optional)</label>
      <textarea
        id="report-detail"
        rows="3"
        placeholder="Share anything that helps our team review this report."
        [ngModel]="detail()"
        (ngModelChange)="detail.set($event)"
      ></textarea>

      <div class="sheet-actions">
        <button class="btn btn-outline" (click)="dismiss.emit()">Cancel</button>
        <button class="btn btn-danger" [disabled]="!reason()" (click)="submit()">
          Submit report
        </button>
      </div>
    } @else {
      <div class="report-done">
        <span class="check" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4.5 12.75l6 6 9-13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <h2 class="sheet-title">Report submitted</h2>
        <p class="muted">Thanks for helping keep Rapport safe. Our team will review it shortly.</p>
        <button class="btn btn-primary btn-block" (click)="dismiss.emit()">Done</button>
      </div>
    }
  </div>
</div>
