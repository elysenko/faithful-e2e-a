<div class="page">
  <header class="page-header">
    <h1 class="page-title">Settings</h1>
  </header>

  <!-- Account card -->
  <section class="card account" (click)="editProfile()">
    <app-avatar [name]="user()?.name || 'You'" [size]="56"></app-avatar>
    <div class="account-meta">
      <strong>{{ user()?.name || 'You' }}</strong>
      <small class="muted">{{ user()?.jobTitle }} · {{ user()?.employer }}</small>
      <small class="subtle">{{ user()?.email }}</small>
    </div>
    <span class="chevron" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none"><path d="m8.25 4.5 7.5 7.5-7.5 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </section>

  <button class="btn btn-outline btn-block edit-btn" (click)="editProfile()">Edit profile &amp; photos</button>

  <!-- Discovery preferences -->
  <section class="group">
    <h2 class="group-title">Discovery &amp; privacy</h2>
    <div class="card toggle-list">
      @for (t of preferences(); track t.key) {
        <div class="toggle-row">
          <div class="toggle-text">
            <strong>{{ t.label }}</strong>
            <small class="muted">{{ t.desc }}</small>
          </div>
          <button
            class="switch"
            [class.on]="t.on"
            role="switch"
            [attr.aria-checked]="t.on"
            [attr.aria-label]="t.label"
            (click)="toggle(t.key)"
          >
            <span class="knob"></span>
          </button>
        </div>
      }
    </div>
  </section>

  @if (isAdmin()) {
    <section class="group">
      <h2 class="group-title">Admin</h2>
      <button class="card admin-row" (click)="openAdmin()">
        <span class="admin-icon">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span class="admin-text">
          <strong>Moderation dashboard</strong>
          <small class="muted">Review reports and manage members</small>
        </span>
        <span class="chevron"><svg viewBox="0 0 24 24" fill="none"><path d="m8.25 4.5 7.5 7.5-7.5 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
    </section>
  }

  <section class="group">
    <h2 class="group-title">Account</h2>
    <div class="card links">
      <button class="link-row">Help &amp; support</button>
      <button class="link-row">Privacy policy</button>
      <button class="link-row danger">Delete account</button>
    </div>
  </section>

  <button class="btn btn-ghost btn-block signout" (click)="logout()">Sign out</button>
  <p class="version subtle center">Rapport · v0.1.0 mockup</p>
</div>
