<div class="overlay" (click)="dismiss.emit()">
  <div class="match-card" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
    <p class="match-kicker">It's a match!</p>
    <h2 class="match-title">You and {{ matchedName }} liked each other</h2>

    <div class="match-avatars">
      <app-avatar [name]="myName" [size]="88" [ring]="true"></app-avatar>
      <span class="match-heart" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
      </span>
      <app-avatar [name]="matchedName" [size]="88" [ring]="true"></app-avatar>
    </div>

    <p class="match-copy muted">
      Say hello while the moment's fresh — matched professionals reply 3× more often.
    </p>

    <div class="match-actions">
      <button class="btn btn-accent btn-block" (click)="message.emit()">Send a message</button>
      <button class="btn btn-ghost btn-block" (click)="dismiss.emit()">Keep discovering</button>
    </div>
  </div>
</div>
