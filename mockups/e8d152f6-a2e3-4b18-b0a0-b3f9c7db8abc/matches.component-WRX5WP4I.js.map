<div class="page">
  <header class="page-header">
    <h1 class="page-title">Matches</h1>
    <p class="page-subtitle">People you both liked. Say hello and start the conversation.</p>
  </header>

  @if (matches().length === 0) {
    <div class="empty">
      <p>No matches yet.</p>
      <button class="btn btn-primary" (click)="goDiscover()">Start discovering</button>
    </div>
  } @else {
    @if (newMatches().length > 0) {
      <section class="new-matches">
        <h2 class="section-label">New matches</h2>
        <div class="new-row">
          @for (m of newMatches(); track m.id) {
            <button class="new-item" (click)="open(m)">
              <span class="new-avatar">
                <app-avatar [name]="m.name" [size]="64" [ring]="true"></app-avatar>
                @if (m.online) { <span class="online-dot"></span> }
              </span>
              <span class="new-name">{{ m.name.split(' ')[0] }}</span>
            </button>
          }
        </div>
      </section>
    }

    <section class="conversations">
      <h2 class="section-label">Messages</h2>
      <ul class="conv-list">
        @for (m of conversations(); track m.id) {
          <li>
            <button class="conv-row" (click)="open(m)">
              <span class="conv-avatar">
                <app-avatar [name]="m.name" [size]="52"></app-avatar>
                @if (m.online) { <span class="online-dot"></span> }
              </span>
              <span class="conv-main">
                <span class="conv-top">
                  <strong class="conv-name">{{ m.name }}</strong>
                  <span class="conv-time subtle">{{ m.lastActivity }}</span>
                </span>
                <span class="conv-role subtle">{{ m.jobTitle }} · {{ m.employer }}</span>
                <span class="conv-msg" [class.unreadmsg]="m.unread > 0">{{ m.lastMessage }}</span>
              </span>
              @if (m.unread > 0) {
                <span class="unread-badge">{{ m.unread }}</span>
              }
            </button>
          </li>
        }
      </ul>
    </section>
  }
</div>
