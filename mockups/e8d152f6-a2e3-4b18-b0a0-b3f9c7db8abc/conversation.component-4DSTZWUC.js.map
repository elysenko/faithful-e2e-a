<div class="chat">
  <header class="chat-head">
    <button class="back-btn" (click)="back()" aria-label="Back to matches">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15.75 19.5 8.25 12l7.5-7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    @if (contact(); as c) {
      <button class="chat-peer" (click)="viewProfile()">
        <span class="peer-avatar">
          <app-avatar [name]="c.name" [size]="40"></app-avatar>
          @if (c.online) { <span class="online-dot"></span> }
        </span>
        <span class="peer-meta">
          <strong>{{ c.name }}</strong>
          <small class="subtle">{{ c.online ? 'Active now' : c.jobTitle }}</small>
        </span>
      </button>
    }
  </header>

  <div class="thread">
    @if (contact(); as c) {
      <div class="match-note">
        <app-avatar [name]="c.name" [size]="56"></app-avatar>
        <p><strong>You matched with {{ c.name.split(' ')[0] }}</strong></p>
        <p class="subtle">{{ c.jobTitle }} · {{ c.employer }}</p>
      </div>
    }

    @for (m of thread(); track m.id) {
      <div class="bubble-row" [class.mine]="m.senderId === myId">
        <div class="bubble" [class.mine]="m.senderId === myId">
          {{ m.body }}
          <span class="bubble-time">{{ m.createdAt }}</span>
        </div>
      </div>
    }

    @if (thread().length === 0) {
      <p class="empty">Say hello to start the conversation.</p>
    }
  </div>

  <form class="composer" (ngSubmit)="send()">
    <input
      class="composer-input"
      type="text"
      placeholder="Write a message…"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      name="draft"
      autocomplete="off"
    />
    <button type="submit" class="send-btn" [disabled]="!draft().trim()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 12 3.27 3.9a.6.6 0 0 1 .81-.74l16.5 7.8a.6.6 0 0 1 0 1.08l-16.5 7.8a.6.6 0 0 1-.81-.74L6 12zm0 0h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </form>
</div>
