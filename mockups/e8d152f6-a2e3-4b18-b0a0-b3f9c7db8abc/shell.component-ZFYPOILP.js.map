<div class="shell" data-testid="app-ready">
  <!-- Desktop sidebar -->
  <aside class="sidebar">
    <a class="brand" routerLink="/feed">
      <span class="brand-mark">R</span>
      <span class="brand-name">Rapport</span>
    </a>

    <nav class="side-nav">
      @for (item of navItems; track item.path) {
        @if (!item.adminOnly || isAdmin()) {
          <a
            class="side-link"
            [routerLink]="item.path"
            routerLinkActive="active"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path [attr.d]="item.icon" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>{{ item.label }}</span>
          </a>
        }
      }
    </nav>

    <div class="side-foot">
      <a class="user-card" routerLink="/settings">
        <app-avatar [name]="user()?.name || 'You'" [size]="40"></app-avatar>
        <span class="user-meta">
          <strong>{{ user()?.name || 'You' }}</strong>
          <small class="muted">{{ user()?.jobTitle || 'Member' }}</small>
        </span>
      </a>
      <button class="btn btn-ghost btn-block" (click)="logout()">Sign out</button>
    </div>
  </aside>

  <div class="main">
    <!-- Mobile top bar -->
    <header class="topbar">
      <a class="brand" routerLink="/feed">
        <span class="brand-mark">R</span>
        <span class="brand-name">Rapport</span>
      </a>
      <a class="icon-btn" routerLink="/settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.076.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.004.827c-.292.24-.437.613-.43.992a6.759 6.759 0 0 1 0 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.281z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>

  <!-- Mobile bottom tab bar -->
  <nav class="tabbar">
    @for (item of navItems; track item.path) {
      @if (!item.adminOnly || isAdmin()) {
        <a class="tab" [routerLink]="item.path" routerLinkActive="active">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path [attr.d]="item.icon" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>{{ item.label }}</span>
        </a>
      }
    }
    <a class="tab" routerLink="/settings" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>You</span>
    </a>
  </nav>
</div>
