<div class="container stack">
  <div class="row-between section-title">
    <div class="stack" style="gap: var(--sp-1);">
      <span class="eyebrow">Fleet</span>
      <h2>Boats</h2>
    </div>
    @if (isCoach()) {
      <a routerLink="/boats/new" class="btn btn-primary">New boat</a>
    }
  </div>

  @if (boats().length === 0) {
    <div class="state">
      <div class="state-icon">🚣</div>
      <p class="muted">No boats in the fleet yet.</p>
    </div>
  } @else {
    <div class="grid-two">
      @for (b of boats(); track b.id) {
        <div class="card card-pad stack" style="gap: var(--sp-3);">
          <div class="row-between">
            <strong>{{ b.name }}</strong>
            <span class="badge" [class]="statusClass(b.status)">{{ b.status }}</span>
          </div>
          <div class="row" style="gap: var(--sp-3);">
            <span class="tag" style="font-size: var(--fs-sm);">Type <strong>{{ boatLabel(b.type) }}</strong></span>
            <span class="tag" style="font-size: var(--fs-sm);">{{ b.seats }} seats</span>
          </div>
          @if (isCoach()) {
            <a [routerLink]="['/boats', b.id]" class="btn btn-outline btn-sm">Edit</a>
          }
        </div>
      }
    </div>
  }
</div>
