<div class="container stack">
  <div class="section-title">
    <div class="stack" style="gap: var(--sp-1);">
      <span class="eyebrow">Directory</span>
      <h2>Members</h2>
    </div>
  </div>

  <div class="filter-bar">
    <input
      class="input"
      type="text"
      placeholder="Search by name or email"
      [value]="query()"
      (input)="query.set($any($event.target).value)"
    />
  </div>

  @if (filtered().length === 0) {
    <div class="state">
      <div class="state-icon">🔍</div>
      <p class="muted">No members match your search.</p>
    </div>
  } @else {
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Level</th><th>Role</th></tr>
        </thead>
        <tbody>
          @for (m of filtered(); track m.id) {
            <tr class="clickable" [routerLink]="['/members', m.id]">
              <td><a [routerLink]="['/members', m.id]">{{ m.name }}</a></td>
              <td class="muted">{{ m.email }}</td>
              <td>@if (m.level) { <span class="tag">{{ m.level }}</span> }</td>
              <td>
                <span class="badge" [class]="m.role === 'coach' ? 'badge-info' : 'badge-neutral'">{{ m.role }}</span>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
