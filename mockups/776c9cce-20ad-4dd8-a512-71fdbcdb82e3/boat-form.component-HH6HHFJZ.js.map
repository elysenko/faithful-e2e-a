<div class="container stack">
  <nav class="breadcrumb">
    <a routerLink="/boats">Boats</a>
    <span class="faint">/</span>
    <span>{{ isEdit ? 'Edit boat' : 'New boat' }}</span>
  </nav>

  <div class="section-title">
    <div class="stack" style="gap: var(--sp-1);">
      <span class="eyebrow">Coach</span>
      <h2>{{ isEdit ? 'Edit boat' : 'New boat' }}</h2>
    </div>
  </div>

  <form class="card card-pad stack" style="max-width: 640px;" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="name">Boat name</label>
      <input id="name" class="input" type="text" formControlName="name"
             [class.input-invalid]="form.controls.name.invalid && form.controls.name.touched" />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <span class="field-error">Name is required.</span>
      }
    </div>

    <div class="field">
      <label for="type">Type</label>
      <select id="type" class="select" formControlName="type">
        @for (t of types; track t.value) {
          <option [value]="t.value">{{ t.label }}</option>
        }
      </select>
    </div>

    <div class="field">
      <label for="seats">Seats</label>
      <input id="seats" class="input" type="number" min="1" formControlName="seats"
             [class.input-invalid]="form.controls.seats.invalid && form.controls.seats.touched" />
      @if (form.controls.seats.invalid && form.controls.seats.touched) {
        <span class="field-error">Seats must be at least 1.</span>
      }
    </div>

    <div class="field">
      <label for="status">Status</label>
      <select id="status" class="select" formControlName="status">
        @for (s of statuses; track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <div class="row">
      <button type="submit" class="btn btn-primary">{{ isEdit ? 'Save changes' : 'Add boat' }}</button>
      <a routerLink="/boats" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
