<div class="container stack">
  <div class="section-title">
    <div class="stack" style="gap: var(--sp-1);">
      <span class="eyebrow">Coach</span>
      <h2>Settings</h2>
    </div>
  </div>

  <p class="muted">Configure backing-service credentials for the club deployment.</p>

  @if (saved()) { <div class="alert alert-success">Settings saved.</div> }

  <div class="stack">
    @for (s of settings(); track s.service) {
      <div class="card card-pad stack">
        <div class="row-between">
          <h3 style="margin: 0;">{{ s.label }}</h3>
          <span class="badge" [class]="s.configured ? 'badge-success' : 'badge-warning'">
            {{ s.configured ? 'Configured' : 'Needs setup' }}
          </span>
        </div>

        @for (f of s.fields; track f.key) {
          <div class="field" style="margin: 0;">
            <label [for]="f.key">{{ f.label }}</label>
            <input
              [id]="f.key"
              class="input"
              [type]="f.secret ? 'password' : 'text'"
              [value]="f.masked"
              [placeholder]="f.secret ? 'Enter ' + f.label.toLowerCase() : f.label"
            />
          </div>
        }
      </div>
    }
  </div>

  <div class="row">
    <button class="btn btn-primary" (click)="save()">Save settings</button>
  </div>
</div>
