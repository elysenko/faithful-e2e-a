<div class="page">
  <a [routerLink]="['/courses', courseId]" class="back-link">← Back to course</a>

  @if (loading()) {
    <div class="state"><div class="spinner"></div><p>Loading lesson…</p></div>
  } @else if (error()) {
    <div class="state state-error"><span class="state-icon">⚠️</span><p>{{ error() }}</p></div>
  } @else {
    @if (lesson(); as l) {
    <article class="card lesson">
      <div class="lesson-top">
        <h1>{{ l.title }}</h1>
        @if (marked()) {
          <span class="badge badge-ok">✓ Completed</span>
        }
      </div>

      <div class="lesson-body">
        @for (para of paragraphs(l.content); track $index) {
          <p>{{ para }}</p>
        }
      </div>
    </article>

    <div class="lesson-foot card">
      <div class="row">
        <span class="muted">Course progress</span>
        <span class="spacer"></span>
        <span class="progress-pct">{{ progressPct() }}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" [style.width.%]="progressPct()"></div>
      </div>
      <a [routerLink]="['/courses', courseId]" class="btn btn-primary btn-block">Continue course</a>
    </div>
    }
  }
</div>
