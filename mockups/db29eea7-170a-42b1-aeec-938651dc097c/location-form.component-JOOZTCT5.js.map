<div class="container narrow">
  <a routerLink="/locations" class="back-link">← Back to locations</a>
  <h1>{{ isEdit ? 'Edit location' : 'New location' }}</h1>
  <p class="muted">{{ isEdit ? 'Update this stock location.' : 'Add a place where stock is held.' }}</p>

  <form class="card form-card" (ngSubmit)="submit()">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" name="name" [(ngModel)]="model.name" placeholder="e.g. Main Warehouse" />
    </div>
    <div class="field">
      <label for="zone">Zone</label>
      <input id="zone" name="zone" [(ngModel)]="model.zone" placeholder="Optional, e.g. A" />
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving…' : (isEdit ? 'Save changes' : 'Create location') }}
      </button>
      <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
