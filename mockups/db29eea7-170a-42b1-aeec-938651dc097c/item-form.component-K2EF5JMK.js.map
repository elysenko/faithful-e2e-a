<div class="container narrow">
  <a routerLink="/" class="back-link">← Back to items</a>
  <h1>{{ isEdit ? 'Edit item' : 'New item' }}</h1>
  <p class="muted">{{ isEdit ? 'Update the catalog record for this item.' : 'Add a new item to the StockRoom catalog.' }}</p>

  <form class="card form-card" (ngSubmit)="submit()">
    <div class="field">
      <label for="sku">SKU</label>
      <input id="sku" name="sku" [(ngModel)]="model.sku" placeholder="SKU-1009" />
    </div>
    <div class="field">
      <label for="name">Name</label>
      <input id="name" name="name" [(ngModel)]="model.name" placeholder="e.g. Steel Bolt M6" />
    </div>
    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" [(ngModel)]="model.description"
                placeholder="Optional notes about the item"></textarea>
    </div>
    <div class="grid-2">
      <div class="field">
        <label for="unit">Unit</label>
        <select id="unit" name="unit" [(ngModel)]="model.unit">
          <option value="pcs">pcs</option>
          <option value="m">m</option>
          <option value="kg">kg</option>
          <option value="l">l</option>
          <option value="cans">cans</option>
          <option value="box">box</option>
        </select>
      </div>
      <div class="field">
        <label for="reorderAt">Reorder threshold</label>
        <input id="reorderAt" type="number" name="reorderAt" min="0"
               [(ngModel)]="model.reorderAt" />
      </div>
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving…' : (isEdit ? 'Save changes' : 'Create item') }}
      </button>
      <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
