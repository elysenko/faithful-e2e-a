<div class="container narrow">
  <h1>Admin settings</h1>
  <p class="muted">Configure the backing services this StockRoom instance depends on.</p>

  @if (saved()) {
    <div class="save-banner">✅ Settings saved.</div>
  }

  <form (ngSubmit)="save()">
    @for (g of groups(); track g.service) {
      <section class="card service-card">
        <div class="service-head">
          <div>
            <h2>{{ g.title }}</h2>
            <p class="muted">{{ g.blurb }}</p>
          </div>
          @if (g.configured) {
            <span class="badge badge-ok">Configured</span>
          } @else {
            <span class="badge badge-warn">Not configured</span>
          }
        </div>

        @for (s of g.settings; track s.key) {
          <div class="field">
            <label [for]="s.key">{{ s.label }} <span class="mono muted key-hint">{{ s.key }}</span></label>
            <input
              [id]="s.key"
              [name]="s.key"
              [(ngModel)]="draft[s.key]"
              [placeholder]="s.configured ? s.value : 'Not set — enter a value'"
            />
          </div>
        }
      </section>
    }

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving…' : 'Save settings' }}
      </button>
    </div>
  </form>
</div>
