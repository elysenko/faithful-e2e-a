<div class="shell">
  <!-- Desktop sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">🔁</span>
      <span class="brand-name">LearnLoop</span>
    </div>
    <nav class="side-nav">
      @for (item of nav(); track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active" class="side-link">
          <span class="nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
    <div class="side-foot">
      <div class="user-chip">
        <span class="avatar">{{ initials() }}</span>
        <span class="user-meta">
          <span class="user-name">{{ user()?.name || user()?.email }}</span>
          <span class="user-role">{{ roleLabel() }}</span>
        </span>
      </div>
      <button type="button" class="btn btn-outline btn-sm btn-block" (click)="logout()">Log out</button>
    </div>
  </aside>

  <!-- Mobile top bar -->
  <header class="topbar">
    <span class="brand-name">LearnLoop</span>
    <button type="button" class="btn btn-ghost btn-sm" (click)="logout()" aria-label="Log out">Log out</button>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile bottom tab bar -->
  <nav class="bottom-nav">
    @for (item of nav(); track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active" class="tab">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="tab-label">{{ item.label }}</span>
      </a>
    }
  </nav>
</div>
