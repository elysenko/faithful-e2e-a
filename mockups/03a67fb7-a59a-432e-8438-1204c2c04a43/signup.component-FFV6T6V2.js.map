<div class="auth-wrap">
  <div class="auth-card card">
    <div class="auth-brand">
      <span class="brand-mark">🔁</span>
      <h1>LearnLoop</h1>
    </div>
    <p class="muted auth-sub">Create your account to start learning.</p>

    <form (ngSubmit)="submit()">
      @if (error()) {
        <p class="error auth-error">{{ error() }}</p>
      }
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" autocomplete="name"
               [(ngModel)]="name" placeholder="Ada Lovelace" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email"
               [(ngModel)]="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password"
               [(ngModel)]="password" placeholder="At least 8 characters" />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password"
               [(ngModel)]="confirm" placeholder="Re-enter password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading()">
        {{ loading() ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p class="hint muted">The first account created becomes the instructor.</p>

    <p class="auth-alt muted">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
