<div class="auth-wrap">
  <div class="auth-card card">
    <div class="auth-brand">
      <span class="brand-mark">🔁</span>
      <h1>LearnLoop</h1>
    </div>
    <p class="muted auth-sub">Sign in to continue learning.</p>

    <form (ngSubmit)="submit()">
      @if (error()) {
        <p class="error auth-error">{{ error() }}</p>
      }
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email"
               [(ngModel)]="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password"
               [(ngModel)]="password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-alt muted">
      New to LearnLoop? <a routerLink="/signup">Create an account</a>
    </p>

    <div class="demo">
      <span class="demo-label muted">Skip login — Demo Mode</span>
      <div class="demo-btns">
        <button type="button" class="btn btn-ghost btn-sm" (click)="demo('student')">Demo as Student</button>
        <button type="button" class="btn btn-ghost btn-sm" (click)="demo('instructor')">Demo as Instructor</button>
      </div>
    </div>
  </div>
</div>
