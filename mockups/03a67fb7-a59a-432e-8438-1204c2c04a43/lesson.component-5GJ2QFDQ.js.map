@if (loading()) {
  <div class="state"><span class="spinner"></span><p>Loading lesson…</p></div>
} @else if (error()) {
  <div class="state"><span class="state-icon">⚠️</span><p class="error">{{ error() }}</p></div>
} @else {
  @if (lesson(); as l) {
    <a [routerLink]="['/courses', courseId]" class="back muted">← Back to course</a>

    <article class="lesson card">
      <header class="lesson-head">
        <span class="badge badge-muted">Lesson</span>
        <h1>{{ l.title }}</h1>
        @if (marked()) {
          <span class="badge badge-ok">✓ Marked complete</span>
        }
      </header>

      <div class="lesson-body" [innerHTML]="l.content"></div>

      <footer class="lesson-foot">
        <a [routerLink]="['/courses', courseId]" class="btn btn-primary">Back to course</a>
      </footer>
    </article>
  } @else {
    <div class="state"><span class="state-icon">🔍</span><p>Lesson not found.</p></div>
  }
}
