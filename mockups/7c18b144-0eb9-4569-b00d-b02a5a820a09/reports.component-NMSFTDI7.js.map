<div class="page">
  <header class="page-header">
    <h1 class="page-title">Reports</h1>
    <span class="badge badge-pending">{{ pendingCount() }} pending</span>
  </header>

  <div class="tabs">
    <button class="tab-btn" [class.active]="filter() === 'pending'" (click)="setFilter('pending')">Pending</button>
    <button class="tab-btn" [class.active]="filter() === 'all'" (click)="setFilter('all')">All</button>
  </div>

  @if (visible().length) {
    <ul class="report-list">
      @for (r of visible(); track r.id) {
        <li>
          <a class="report card" [routerLink]="['/admin/reports', r.id]">
            <div class="report-top">
              <strong>{{ r.reportedName }}</strong>
              <span class="badge" [class.badge-pending]="r.status === 'pending'" [class.badge-reviewed]="r.status === 'reviewed'">
                {{ r.status }}
              </span>
            </div>
            <p class="report-reason">{{ r.reason }}</p>
            <p class="report-meta muted">Reported by {{ r.reporterName }} · {{ r.createdAt }}</p>
          </a>
        </li>
      }
    </ul>
  } @else {
    <div class="empty-state">
      <div class="empty-emoji" aria-hidden="true">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.8 2.8L16 9.5"/></svg>
      </div>
      <h2>Queue clear</h2>
      <p class="muted">No pending reports right now. Nice work.</p>
    </div>
  }
</div>
